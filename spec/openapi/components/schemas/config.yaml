ConfigResponse:
  type: object
  description: |
    Server-level configuration and feature flags. The frontend should
    fetch this once at startup to determine which UI features to show.
  required:
    - billing_enabled
    - stripe_test_mode
    - google_oauth_configured
    - microsoft_oauth_configured
  properties:
    billing_enabled:
      type: boolean
      description: |
        Whether billing features (Stripe integration, request metering, plan
        limits) are active. When `false` (the default), all users have the
        unlimited `pay_as_you_go` plan and billing UI should be hidden.
        Controlled by the `BILLING_ENABLED` server environment variable.
      example: false
    stripe_test_mode:
      type: boolean
      description: |
        Whether the server is using Stripe test-mode keys. When `true`, the
        frontend should use `VITE_STRIPE_PUBLISHABLE_KEY_TEST` instead of
        `VITE_STRIPE_PUBLISHABLE_KEY`. Only enabled when `STRIPE_TEST_MODE=true`
        and `BILLING_ENABLED=true` on the server.
      example: false
    google_oauth_configured:
      type: boolean
      description: |
        Whether Google OAuth client credentials are configured on the server.
        When `true`, the built-in Google connector can initiate OAuth flows
        without BYOA setup. When `false`, users must provide their own Google
        OAuth app credentials via the BYOA configuration UI.
      example: true
    microsoft_oauth_configured:
      type: boolean
      description: |
        Whether Microsoft OAuth client credentials are configured on the server.
        When `true`, the built-in Microsoft connector can initiate OAuth flows
        without BYOA setup. When `false`, users must provide their own Microsoft
        OAuth app credentials via the BYOA configuration UI.
      example: true
