ConfigResponse:
  type: object
  description: |
    Server-level configuration and feature flags. The frontend should
    fetch this once at startup to determine which UI features to show.
  required:
    - billing_enabled
    - stripe_test_mode
  properties:
    billing_enabled:
      type: boolean
      description: |
        Whether billing features (Stripe integration, request metering, plan
        limits) are active. When `false` (the default), all users have the
        unlimited `pay_as_you_go` plan and billing UI should be hidden.
        Controlled by the `BILLING_ENABLED` server environment variable.
      example: false
    stripe_test_mode:
      type: boolean
      description: |
        Whether the server is using Stripe test-mode keys. When `true`, the
        frontend should use `VITE_STRIPE_PUBLISHABLE_KEY_TEST` instead of
        `VITE_STRIPE_PUBLISHABLE_KEY`. Only enabled when `STRIPE_TEST_MODE=true`
        and `BILLING_ENABLED=true` on the server.
      example: false
