ApprovalRequest:
  type: object
  required:
    - agent_id
    - request_id
    - approver
    - action
    - context
  properties:
    agent_id:
      type: integer
      format: int64
      description: |
        Auto-incrementing agent identifier. MUST match the `agent_id` associated with the
        signing key in the `X-Permission-Slip-Signature` header. If mismatch, Permission Slip
        returns `400 Bad Request` with error code `agent_id_mismatch`.
      example: 42

    request_id:
      type: string
      format: uuid
      maxLength: 64
      description: |
        Unique request identifier for replay protection and idempotency. UUID v4 recommended.

        Permission Slip tracks this value within the timestamp window (300 seconds) and rejects
        duplicate requests with `409 Conflict` error code `duplicate_request_id`.
      example: "a925fbe0-db83-4969-9dc5-27f40385f12c"

    approver:
      type: string
      pattern: '^[a-zA-Z0-9_-]{1,64}$'
      maxLength: 64
      description: |
        Permission Slip username who must approve this action. Must be registered as an
        authorized approver for this agent.

        Returns `404 Not Found` with error code `approver_not_found` if username doesn't
        exist, or `403 Forbidden` with error code `agent_not_authorized` if approver is
        not authorized for this agent.
      example: "alice"

    configuration_id:
      type: string
      pattern: '^ac_[a-f0-9]{32}$'
      maxLength: 36
      description: |
        Optional reference to an action configuration. When provided, Permission Slip
        validates:

        - The configuration exists and belongs to this agent
        - The configuration is active (not disabled)
        - The `action.type` matches the configuration's `action_type`
        - The `action.parameters` comply with the configuration constraints:
          fixed parameters must match exactly, wildcard parameters accept any value

        If the configuration reference is invalid, Permission Slip returns
        `400 Bad Request` with error code `invalid_configuration`. If the
        configuration is disabled, returns `403 Forbidden` with error code
        `configuration_disabled`. If the configuration's `action_type` does not
        match the request's `action.type`, returns `400 Bad Request` with error
        code `configuration_action_type_mismatch`.

        When omitted, the approval request proceeds through the standard flow
        without configuration-based validation.
      example: "ac_1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d"

    action:
      $ref: './shared.yaml#/Action'

    context:
      $ref: './shared.yaml#/ActionContext'

    payment_method_id:
      type: string
      description: |
        Optional payment method ID for actions that require payment (e.g., `requires_payment_method: true`
        in the connector action definition). When a standing approval auto-approves the request, this
        value is forwarded to the connector for payment processing.
      example: "pm_abc123"

    amount_cents:
      type: integer
      minimum: 0
      description: |
        Optional transaction amount in cents for payment-required actions. Required when
        `payment_method_id` is provided. Validated against per-transaction and monthly spending
        limits configured on the payment method.
      example: 9900

  example:
    agent_id: 42
    request_id: "a925fbe0-db83-4969-9dc5-27f40385f12c"
    approver: "alice"
    configuration_id: "ac_1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d"
    action:
      type: "email.send"
      version: "1"
      parameters:
        from: "alice@example.com"
        to:
          - "recipient@example.com"
        subject: "Hello World"
        body: "This is a test email."
    context:
      description: "Send welcome email to new user"
      risk_level: "low"
      details:
        recipient_count: 1

ApprovalRequestResponse:
  type: object
  description: |
    Response after submitting an approval request. Two possible outcomes:

    **Auto-approved** (`status: "approved"`): A matching standing approval was found.
    The action was executed immediately. The response includes `result` and
    `standing_approval_id`. No `approval_id` or `approval_url` is returned.

    **Pending** (`status: "pending"`): No standing approval matched. A pending approval
    was created. The agent should poll `GET /v1/approvals/{approval_id}/status` for the
    result, or listen via `GET /v1/approvals/events` (SSE).
  required:
    - status
  properties:
    approval_id:
      type: string
      pattern: '^appr_[a-zA-Z0-9]{6,64}$'
      maxLength: 70
      description: |
        Unique approval identifier. Present only when `status` is `pending`.
      example: "appr_xyz789"

    approval_url:
      type: string
      format: uri
      maxLength: 4096
      pattern: '^https://'
      description: |
        Approval URL for the approver to review. Present only when `status` is `pending`.
      example: "https://app.permissionslip.dev/permission-slip/approve/appr_xyz789"

    alternative_urls:
      $ref: './shared.yaml#/AlternativeUrls'

    status:
      type: string
      enum:
        - pending
        - approved
      description: |
        `pending` — approval created, awaiting human review.
        `approved` — auto-approved via standing approval, result is inline.
      example: "pending"

    expires_at:
      type: string
      format: date-time
      description: |
        When the pending approval expires. Present only when `status` is `pending`.
      example: "2026-02-11T13:25:00Z"

    created_at:
      type: string
      format: date-time
      description: |
        When the approval was created. Present only when `status` is `pending`.
      example: "2026-02-11T13:20:00Z"

    result:
      description: |
        Execution result from the connector. Present only when `status` is `approved`
        (auto-approved via standing approval).

    standing_approval_id:
      type: string
      description: |
        ID of the standing approval that matched. Present only when `status` is `approved`.
      example: "sa_abc123"

  example:
    approval_id: "appr_xyz789"
    approval_url: "https://app.permissionslip.dev/permission-slip/approve/appr_xyz789"
    status: "pending"
    expires_at: "2026-02-11T13:25:00Z"

CancelApprovalRequest:
  type: object
  required:
    - request_id
  properties:
    request_id:
      type: string
      format: uuid
      maxLength: 64
      description: |
        Unique request identifier for replay protection. UUID v4 recommended.
      example: "21d9ec79-6b20-45b9-8695-83537318966d"

  example:
    request_id: "21d9ec79-6b20-45b9-8695-83537318966d"

CancelApprovalResponse:
  type: object
  required:
    - status
    - cancelled_at
  properties:
    status:
      type: string
      enum:
        - cancelled
      description: |
        Approval status. Always `cancelled` for successful cancellation.
      example: "cancelled"

    cancelled_at:
      type: string
      format: date-time
      description: |
        ISO 8601 timestamp (RFC 3339 format, UTC) when the approval was cancelled.
      example: "2026-02-11T13:21:00Z"

  example:
    status: "cancelled"
    cancelled_at: "2026-02-11T13:21:00Z"

ApprovalSummary:
  type: object
  description: Summary of an approval request for the dashboard.
  required:
    - approval_id
    - agent_id
    - action
    - context
    - status
    - expires_at
    - created_at
  properties:
    approval_id:
      type: string
      description: Unique approval identifier
      example: "appr_xyz789"
    agent_id:
      type: integer
      format: int64
      description: Agent that requested the approval
      example: 42
    action:
      description: |
        Same as `Action`, plus optional frozen connector instance fields when the
        request targeted a specific instance (`_connector_instance_id`, `_connector_instance_display`).
      allOf:
        - $ref: './shared.yaml#/Action'
        - type: object
          properties:
            _connector_instance_id:
              type: string
              format: uuid
              description: Frozen UUID of the connector instance for this approval (if any).
            _connector_instance_display:
              type: string
              description: >-
                Snapshot of the credential display name at request time (if any). Legacy actions may
                still expose `_connector_instance_label` instead.
    context:
      $ref: './shared.yaml#/ActionContext'
    status:
      type: string
      enum:
        - pending
        - approved
        - denied
        - cancelled
        - expired
      description: Current approval status. Pending approvals past their expiration time are returned as "expired".
      example: "pending"
    expires_at:
      type: string
      format: date-time
      description: When the approval expires
      example: "2026-02-11T13:25:00Z"
    approved_at:
      type: string
      format: date-time
      nullable: true
      description: When the approval was approved (null if not approved)
    denied_at:
      type: string
      format: date-time
      nullable: true
      description: When the approval was denied (null if not denied)
    cancelled_at:
      type: string
      format: date-time
      nullable: true
      description: When the approval was cancelled (null if not cancelled)
    created_at:
      type: string
      format: date-time
      description: When the approval request was created
      example: "2026-02-11T13:20:00Z"
    resource_details:
      type: object
      nullable: true
      description: |
        Human-readable metadata for resources referenced by opaque IDs in the
        action parameters. Populated at request time via the connector's
        ResourceDetailResolver. Null when the connector doesn't support
        resource resolution or the lookup failed.
      additionalProperties: true
      example:
        title: "Q1 Planning Meeting"
        start_time: "2026-03-15T14:00:00Z"
        end_time: "2026-03-15T15:00:00Z"
    execution_status:
      allOf:
        - $ref: './shared.yaml#/ExecutionStatus'
        - nullable: true
          description: |
            Status of the action execution. Only present when status is `approved`.
            Null for pending, denied, or cancelled approvals.
    execution_result:
      $ref: './shared.yaml#/ExecutionResult'
    executed_at:
      $ref: './shared.yaml#/ExecutedAt'

ApprovalListResponse:
  type: object
  description: Paginated list of approval requests.
  required:
    - data
    - has_more
  properties:
    data:
      type: array
      items:
        $ref: '#/ApprovalSummary'
    has_more:
      type: boolean
      description: Whether more approvals exist beyond this page.
      example: false
    next_cursor:
      type: string
      description: |
        Opaque cursor to pass as the `after` query parameter to fetch the
        next page. Only present when `has_more` is true. Do not construct
        or parse cursor values — they may change format without notice.
      example: "2026-02-11T13:20:00.123456Z,appr_xyz789"

ApproveApprovalResponse:
  type: object
  required:
    - approval_id
    - status
    - approved_at
    - confirmation_code
    - execution_status
  properties:
    approval_id:
      type: string
      description: Unique approval identifier
      example: "appr_xyz789"
    status:
      type: string
      enum:
        - approved
      description: Always `approved` for successful approval.
      example: "approved"
    approved_at:
      type: string
      format: date-time
      description: When the approval was approved
      example: "2026-02-21T10:30:00Z"
    confirmation_code:
      type: string
      description: |
        Ephemeral confirmation code in `XXXXX-XXXXX` format. Displayed to the
        approver as a visual receipt and shared with the agent to confirm
        the approval. Generated at approval time and not persisted.
      pattern: "^[A-Z2-9]{5}-[A-Z2-9]{5}$"
      example: "RK3P7-MNPQR"
    execution_status:
      $ref: './shared.yaml#/ExecutionStatus'
    execution_result:
      $ref: './shared.yaml#/ExecutionResult'

ApprovalStatusResponse:
  type: object
  description: |
    Response for agent polling of approval status and execution result.
    Agents use this to check whether their approval has been resolved and,
    if approved, to retrieve the execution result.
  required:
    - approval_id
    - status
  properties:
    approval_id:
      type: string
      description: Unique approval identifier
      example: "appr_xyz789"
    status:
      type: string
      enum:
        - pending
        - approved
        - denied
        - cancelled
        - expired
      description: Current status of the approval request. Pending approvals past their expiration time are returned as "expired".
      example: "approved"
    approved_at:
      type: string
      format: date-time
      nullable: true
      description: When the approval was approved (null if not yet approved)
      example: "2026-02-21T10:30:00Z"
    denied_at:
      type: string
      format: date-time
      nullable: true
      description: When the approval was denied (null if not denied)
    cancelled_at:
      type: string
      format: date-time
      nullable: true
      description: When the approval was cancelled (null if not cancelled)
    expires_at:
      type: string
      format: date-time
      description: When the approval expires
      example: "2026-02-21T10:35:00Z"
    execution_status:
      allOf:
        - $ref: './shared.yaml#/ExecutionStatus'
        - nullable: true
          description: |
            Status of the action execution. Only present when approval status is `approved`.
            Null when the approval has not been approved yet.
    execution_result:
      $ref: './shared.yaml#/ExecutionResult'
    executed_at:
      $ref: './shared.yaml#/ExecutedAt'

DenyApprovalResponse:
  type: object
  required:
    - approval_id
    - status
    - denied_at
  properties:
    approval_id:
      type: string
      description: Unique approval identifier
      example: "appr_xyz789"
    status:
      type: string
      enum:
        - denied
      description: Always `denied` for successful denial.
      example: "denied"
    denied_at:
      type: string
      format: date-time
      description: When the approval was denied
      example: "2026-02-21T10:30:00Z"
