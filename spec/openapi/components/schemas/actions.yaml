ExecuteActionRequest:
  description: |
    Execute an action via Permission Slip using a standing approval.

    The agent provides a `request_id`, `action` object, and optionally a `configuration_id`.
    Permission Slip matches an active standing approval for the agent + action type + constraints
    and executes the action using the user's stored credentials.

    One-off approvals are executed directly when the user approves — agents receive results
    via `GET /v1/approvals/{approval_id}/status` instead of calling this endpoint.
  $ref: '../schemas/standing_approvals.yaml#/StandingApprovalExecuteRequest'

ExecuteActionResponse:
  description: |
    Response from executing an action via a standing approval. Returns the action result,
    the standing approval that authorized execution, and the remaining execution count.
  $ref: '../schemas/standing_approvals.yaml#/StandingApprovalExecuteResponse'
