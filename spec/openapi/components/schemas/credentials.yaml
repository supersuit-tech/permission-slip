StoreCredentialRequest:
  type: object
  required:
    - service
    - credentials
  properties:
    service:
      type: string
      maxLength: 128
      pattern: '^[a-z][a-z0-9_.-]*$'
      description: |
        Identifier for the external service these credentials are for. Uses lowercase
        dot-separated naming convention.

        Examples: `github`, `stripe`, `slack`, `jira`

        This identifier links credentials to connectors — when Permission Slip executes
        an action, it looks up credentials by the connector's required service identifier.
      example: "github"

    credentials:
      type: object
      additionalProperties: true
      description: |
        Credentials for the external service. The structure depends on the service's
        authentication method.

        **Common patterns**:
        - API key: `{ "api_key": "sk_live_..." }`
        - Token: `{ "api_token": "ghp_..." }`
        - Username/password: `{ "username": "...", "password": "..." }`

        **Security**: These credentials are provided in plaintext in the API request
        (over HTTPS) and are encrypted at rest by Permission Slip. They are only
        decrypted at the moment of action execution and are never exposed to agents or
        included in API responses. See the Security section for more details.
      example:
        api_key: "ghp_abc123..."

    label:
      type: string
      maxLength: 256
      description: |
        Optional human-readable label for this credential set. Useful when a user has
        multiple accounts for the same service.

        Examples: "Work GitHub", "Personal Stripe", "Company Slack"
      example: "Personal Access Token"

  example:
    service: "github"
    credentials:
      api_key: "ghp_abc123..."
    label: "Personal Access Token"

StoreCredentialResponse:
  type: object
  required:
    - id
    - service
    - created_at
  properties:
    id:
      type: string
      pattern: '^cred_[a-zA-Z0-9]{6,64}$'
      maxLength: 70
      description: |
        Unique credential identifier assigned by Permission Slip.
      example: "cred_abc123"

    service:
      type: string
      maxLength: 128
      description: |
        Service identifier (echoed from request).
      example: "github"

    label:
      type: string
      maxLength: 256
      description: |
        Human-readable label (echoed from request, if provided).
      example: "Personal Access Token"

    created_at:
      type: string
      format: date-time
      description: |
        ISO 8601 timestamp (RFC 3339 format, UTC) when the credential was stored.
      example: "2026-02-11T10:00:00Z"

  example:
    id: "cred_abc123"
    service: "github"
    label: "Personal Access Token"
    created_at: "2026-02-11T10:00:00Z"

CredentialListResponse:
  type: object
  required:
    - credentials
  properties:
    credentials:
      type: array
      items:
        $ref: '../schemas/credentials.yaml#/CredentialSummary'
      description: |
        List of stored credentials. Only metadata is returned — secrets are never exposed.

  example:
    credentials:
      - id: "cred_abc123"
        service: "github"
        label: "Personal Access Token"
        created_at: "2026-02-11T10:00:00Z"
      - id: "cred_def456"
        service: "stripe"
        label: "Business Stripe"
        created_at: "2026-02-12T14:30:00Z"

CredentialSummary:
  type: object
  required:
    - id
    - service
    - created_at
  properties:
    id:
      type: string
      pattern: '^cred_[a-zA-Z0-9]{6,64}$'
      maxLength: 70
      description: |
        Unique credential identifier.
      example: "cred_abc123"

    service:
      type: string
      maxLength: 128
      description: |
        Service identifier for these credentials.
      example: "github"

    label:
      type: string
      maxLength: 256
      description: |
        Human-readable label, if one was provided when storing the credential.
      example: "Personal Access Token"

    created_at:
      type: string
      format: date-time
      description: |
        ISO 8601 timestamp (RFC 3339 format, UTC) when the credential was stored.
      example: "2026-02-11T10:00:00Z"

  example:
    id: "cred_abc123"
    service: "github"
    label: "Personal Access Token"
    created_at: "2026-02-11T10:00:00Z"

DeleteCredentialResponse:
  type: object
  required:
    - id
    - deleted_at
  properties:
    id:
      type: string
      pattern: '^cred_[a-zA-Z0-9]{6,64}$'
      maxLength: 70
      description: |
        Credential identifier that was deleted.
      example: "cred_abc123"

    deleted_at:
      type: string
      format: date-time
      description: |
        ISO 8601 timestamp (RFC 3339 format, UTC) when the credential was deleted.
      example: "2026-02-11T15:00:00Z"

  example:
    id: "cred_abc123"
    deleted_at: "2026-02-11T15:00:00Z"
