Action:
  type: object
  required:
    - type
    - parameters
  properties:
    type:
      type: string
      maxLength: 128
      description: |
        Action type identifier. Determines the structure and semantics of the parameters.
        
        ## Naming Patterns
        
        ### Standard Types (2 segments)
        Reserved for future protocol standardization. Format: `<category>.<operation>`
        
        - Pattern: `^[a-z][a-z0-9_]*\.[a-z][a-z0-9_]*$`
        - Max length: 64 characters
        - Examples: `email.send`, `payment.charge`, `data.delete`, `calendar.create`
        
        ### Custom Types (4+ segments)
        Service-specific types using reverse-DNS notation.
        
        - Pattern: Domain (2+ segments) + category + operation = 4+ segments total
        - Max length: 128 characters
        - Examples: 
          - `com.example.deploy.production` (4 segments)
          - `io.github.repo.delete` (4 segments)
          - `org.acme.internal.admin_action` (4 segments)
        
        Permission Slip validates action types and returns `400 Bad Request` with error code 
        `invalid_action_type` for invalid formats, or `unsupported_action_type` for 
        types not supported by any installed connector.
      example: "email.send"
    
    version:
      type: string
      pattern: '^\d+$'
      default: "1"
      maxLength: 10
      description: |
        Action type version. Must be a positive integer as a string. Default is `"1"`.
        
        Increment version when making breaking changes to parameter structure or semantics. 
        Non-breaking additions (new optional parameters) do not require version increment.
        
        Permission Slip validates supported versions and returns `400 Bad Request` with error code 
        `unsupported_action_version` for unsupported versions.
      example: "1"
    
    parameters:
      type: object
      additionalProperties: true
      description: |
        Action-specific parameters. Structure is defined by the action type and version.
        
        Permission Slip validates parameters against the expected schema for the action type. 
        The parameters object is hashed (using RFC 8785 JSON Canonicalization Scheme) and 
        included in approval tokens as `params_hash` to prevent parameter tampering.
        
        **Security**: Permission Slip verifies that request parameters match the params_hash 
        in the approval token before executing actions.
      example:
        from: "alice@example.com"
        to:
          - "recipient@example.com"
        subject: "Hello World"
        body: "This is a test email."
  
  example:
    type: "email.send"
    version: "1"
    parameters:
      from: "alice@example.com"
      to:
        - "recipient@example.com"
      subject: "Hello World"
      body: "This is a test email."

ActionContext:
  type: object
  required:
    - description
  properties:
    description:
      type: string
      minLength: 1
      maxLength: 500
      description: |
        Brief human-readable description of what the action will do. Shown to approver in 
        the approval UI. Should be clear and specific enough for the approver to make an 
        informed decision.
      example: "Send welcome email to new user"
    
    risk_level:
      type: string
      enum:
        - low
        - medium
        - high
      description: |
        Risk level assessment of the action. Helps approvers understand the potential impact.
        
        - **low**: Minimal impact, easily reversible (e.g., send email, read data)
        - **medium**: Moderate impact, some consequences (e.g., update database, post to social media)
        - **high**: Significant impact, hard to reverse (e.g., delete data, make payment, deploy to production)
      example: "low"
    
    details:
      type: object
      additionalProperties: true
      description: |
        Additional context for the approver. Structure is flexible and action-specific. 
        Use for metadata that helps the approver understand the action without exposing 
        sensitive data.
        
        Examples:
        - `recipient_count`: Number of email recipients
        - `estimated_cost`: Estimated cost of a payment action
        - `affected_resources`: List of resources that will be modified
      example:
        recipient_count: 1
        estimated_time: "5 minutes"
  
  example:
    description: "Send welcome email to new user"
    risk_level: "low"
    details:
      recipient_count: 1
      estimated_time: "5 minutes"

AlternativeUrls:
  type: object
  description: |
    Optional alternative URL formats for platform-specific deep linking. If omitted, clients 
    MUST use the primary URL (registration_url or approval_url).
  properties:
    deeplink:
      type: string
      format: uri
      maxLength: 4096
      description: |
        Native app deep link URL. Opens directly in the mobile app if installed, bypassing 
        the browser. Uses custom URI scheme (e.g., `permissionslip://`) or universal link.
      example: "permissionslip://permission-slip/approve?token=eyJ..."
    
    web:
      type: string
      format: uri
      maxLength: 4096
      pattern: '^https://'
      description: |
        Web-only URL that opens in browser. Useful for separating web authentication flow 
        from mobile app flow, or for services with multiple web domains.
      example: "https://accounts.permissionslip.dev/permission-slip/approve?token=eyJ..."
  
  example:
    deeplink: "permissionslip://permission-slip/approve?token=eyJ..."
    web: "https://accounts.permissionslip.dev/permission-slip/approve?token=eyJ..."
