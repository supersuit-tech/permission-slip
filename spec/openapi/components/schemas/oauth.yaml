OAuthProvider:
  type: object
  required:
    - id
    - scopes
    - source
    - has_credentials
  properties:
    id:
      type: string
      description: The OAuth provider ID (e.g. "google", "microsoft", "zoom")
      example: "google"
    scopes:
      type: array
      items:
        type: string
      description: Default OAuth scopes for this provider
      example: ["openid", "https://www.googleapis.com/auth/userinfo.email"]
    source:
      type: string
      enum: ["built_in", "manifest"]
      description: Where the provider configuration originated
      example: "built_in"
    has_credentials:
      type: boolean
      description: Whether the provider has client credentials configured and is ready to use
      example: true
    pkce:
      type: boolean
      description: >
        When true, the platform uses PKCE (RFC 7636) for this provider's authorize
        and token exchange. Clients only need to start the usual browser redirect;
        the verifier is stored server-side in the OAuth state token.
      default: false
      example: false

OAuthProviderListResponse:
  type: object
  required:
    - providers
  properties:
    providers:
      type: array
      items:
        $ref: '#/OAuthProvider'
      description: List of available OAuth providers

OAuthConnection:
  type: object
  required:
    - id
    - provider
    - scopes
    - status
    - connected_at
  properties:
    id:
      type: string
      description: Unique identifier for this OAuth connection.
      example: "oc_abc123"
    provider:
      type: string
      description: The OAuth provider ID (e.g. "google", "microsoft", "zoom")
      example: "google"
    scopes:
      type: array
      items:
        type: string
      description: The OAuth scopes granted by the provider
      example: ["openid", "https://www.googleapis.com/auth/userinfo.email"]
    status:
      type: string
      enum: ["active", "needs_reauth", "revoked"]
      description: >
        The current status of the connection.
        `active` — connection is valid and tokens are current (automatically refreshed before expiry).
        `needs_reauth` — token refresh failed (token revoked, expired refresh token, or no refresh token available); user must re-authorize via Settings.
        `revoked` — user explicitly disconnected the provider.
      example: "active"
    connected_at:
      type: string
      format: date-time
      description: When the OAuth connection was established
      example: "2026-03-05T10:00:00Z"
    instance:
      type: string
      description: >
        For providers with per-instance OAuth URLs (e.g. Zendesk, Shopify),
        the instance identifier — subdomain for Zendesk (e.g. "mycompany.zendesk.com")
        or shop domain for Shopify (e.g. "mystore.myshopify.com"). Omitted for
        providers with static OAuth endpoints (e.g. Google, Slack).
      example: "mycompany.zendesk.com"
    display_name:
      type: string
      description: >
        A human-readable identifier for this connection — the provider
        username (e.g. GitHub login) when available, otherwise the
        authenticated user's email address. Omitted when no identifying
        information is available.
      example: "octocat"

OAuthConnectionListResponse:
  type: object
  required:
    - connections
  properties:
    connections:
      type: array
      items:
        $ref: '#/OAuthConnection'
      description: List of OAuth connections for the authenticated user

OAuthDisconnectResponse:
  type: object
  required:
    - provider
    - disconnected_at
  properties:
    provider:
      type: string
      description: The OAuth provider that was disconnected
      example: "google"
    disconnected_at:
      type: string
      format: date-time
      description: When the OAuth provider was disconnected
      example: "2026-03-05T15:00:00Z"
