OAuthProvider:
  type: object
  required:
    - id
    - scopes
    - source
    - has_credentials
  properties:
    id:
      type: string
      description: The OAuth provider ID (e.g. "google", "microsoft")
      example: "google"
    scopes:
      type: array
      items:
        type: string
      description: Default OAuth scopes for this provider
      example: ["openid", "https://www.googleapis.com/auth/userinfo.email"]
    source:
      type: string
      enum: ["built_in", "manifest", "byoa"]
      description: Where the provider configuration originated
      example: "built_in"
    has_credentials:
      type: boolean
      description: Whether the provider has client credentials configured and is ready to use
      example: true

OAuthProviderListResponse:
  type: object
  required:
    - providers
  properties:
    providers:
      type: array
      items:
        $ref: '#/OAuthProvider'
      description: List of available OAuth providers

OAuthConnection:
  type: object
  required:
    - provider
    - scopes
    - status
    - connected_at
  properties:
    provider:
      type: string
      description: The OAuth provider ID (e.g. "google", "microsoft")
      example: "google"
    scopes:
      type: array
      items:
        type: string
      description: The OAuth scopes granted by the provider
      example: ["openid", "https://www.googleapis.com/auth/userinfo.email"]
    status:
      type: string
      enum: ["active", "needs_reauth", "revoked"]
      description: >
        The current status of the connection.
        `active` — connection is valid and tokens are current (automatically refreshed before expiry).
        `needs_reauth` — token refresh failed (token revoked, expired refresh token, or no refresh token available); user must re-authorize via Settings.
        `revoked` — user explicitly disconnected the provider.
      example: "active"
    connected_at:
      type: string
      format: date-time
      description: When the OAuth connection was established
      example: "2026-03-05T10:00:00Z"

OAuthConnectionListResponse:
  type: object
  required:
    - connections
  properties:
    connections:
      type: array
      items:
        $ref: '#/OAuthConnection'
      description: List of OAuth connections for the authenticated user

OAuthDisconnectResponse:
  type: object
  required:
    - provider
    - disconnected_at
  properties:
    provider:
      type: string
      description: The OAuth provider that was disconnected
      example: "google"
    disconnected_at:
      type: string
      format: date-time
      description: When the OAuth provider was disconnected
      example: "2026-03-05T15:00:00Z"

CreateOAuthProviderConfigRequest:
  type: object
  description: |
    Request body for registering BYOA (Bring Your Own App) OAuth credentials.
    The provider must already be declared by a built-in config or connector
    manifest — this endpoint only supplies the client ID and secret.
    Credentials are encrypted at rest in Supabase Vault (AES-256-GCM).
    Only one config per provider per user is allowed.
  required:
    - provider
    - client_id
    - client_secret
  properties:
    provider:
      type: string
      description: |
        The OAuth provider ID to configure. Must match a provider already
        declared by a built-in config or connector manifest (e.g. "salesforce",
        "google"). Use GET /v1/oauth/providers to discover available providers.
      example: "salesforce"
      maxLength: 128
    client_id:
      type: string
      description: |
        The OAuth application's client ID, obtained from the provider's
        developer console (e.g. Google Cloud Console, Salesforce Connected App).
      example: "my-client-id"
      maxLength: 2048
    client_secret:
      type: string
      description: |
        The OAuth application's client secret. This value is encrypted in
        Supabase Vault and never returned in API responses.
      example: "my-client-secret"
      maxLength: 2048

UpdateOAuthProviderConfigRequest:
  type: object
  description: |
    Request body for rotating BYOA OAuth credentials. Both client_id and
    client_secret must be provided — partial updates are not supported.
    The old vault secrets are deleted and replaced atomically within a
    database transaction.
  required:
    - client_id
    - client_secret
  properties:
    client_id:
      type: string
      description: The new OAuth application's client ID
      example: "my-new-client-id"
      maxLength: 2048
    client_secret:
      type: string
      description: |
        The new OAuth application's client secret. Encrypted in Supabase
        Vault and never returned in API responses.
      example: "my-new-client-secret"
      maxLength: 2048

OAuthProviderConfig:
  type: object
  description: |
    A BYOA provider config indicating the user has registered their own
    OAuth client credentials for this provider. Client secrets are never
    included — only the provider ID and timestamps are returned.
  required:
    - provider
    - created_at
    - updated_at
  properties:
    provider:
      type: string
      description: The OAuth provider ID (e.g. "salesforce", "google")
      example: "salesforce"
    created_at:
      type: string
      format: date-time
      description: When the BYOA credentials were first registered
      example: "2026-03-05T12:00:00Z"
    updated_at:
      type: string
      format: date-time
      description: When the BYOA credentials were last rotated (equals created_at if never updated)
      example: "2026-03-05T14:00:00Z"

OAuthProviderConfigListResponse:
  type: object
  required:
    - configs
  properties:
    configs:
      type: array
      items:
        $ref: '#/OAuthProviderConfig'
      description: |
        List of BYOA provider configs for the authenticated user. Each entry
        indicates the user has registered custom OAuth credentials for that
        provider. Empty array if no BYOA configs exist.

OAuthProviderConfigDeleteResponse:
  type: object
  description: |
    Confirmation that the BYOA provider config and its encrypted vault
    secrets have been deleted. After deletion, the provider reverts to
    its built-in or manifest configuration (if any).
  required:
    - provider
    - deleted_at
  properties:
    provider:
      type: string
      description: The OAuth provider whose BYOA credentials were deleted
      example: "salesforce"
    deleted_at:
      type: string
      format: date-time
      description: When the BYOA credentials were deleted
      example: "2026-03-05T15:00:00Z"
