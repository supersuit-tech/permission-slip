AgentConnectorListResponse:
  type: object
  required:
    - data
  properties:
    data:
      type: array
      items:
        $ref: '../schemas/agent_connectors.yaml#/AgentConnectorSummary'
      description: |
        List of connectors enabled for this agent. Each entry includes the connector
        summary plus when it was enabled.

  example:
    data:
      - id: "gmail"
        name: "Gmail"
        description: "Send and manage emails via Gmail API"
        actions:
          - "email.send"
          - "email.read"
        required_credentials:
          - "gmail"
        enabled_at: "2026-02-18T10:00:00Z"

AgentConnectorSummary:
  allOf:
    - $ref: '../schemas/connectors.yaml#/ConnectorSummary'
    - type: object
      required:
        - enabled_at
      properties:
        enabled_at:
          type: string
          format: date-time
          description: |
            ISO 8601 timestamp when this connector was enabled for the agent.
          example: "2026-02-18T10:00:00Z"

  example:
    id: "gmail"
    name: "Gmail"
    description: "Send and manage emails via Gmail API"
    actions:
      - "email.send"
      - "email.read"
    required_credentials:
      - "gmail"
    enabled_at: "2026-02-18T10:00:00Z"

AgentConnectorResponse:
  type: object
  required:
    - agent_id
    - connector_id
    - enabled_at
  properties:
    agent_id:
      type: integer
      format: int64
      description: |
        Auto-incrementing agent identifier.
      example: 42

    connector_id:
      type: string
      maxLength: 128
      description: |
        Connector identifier that was enabled.
      example: "gmail"

    enabled_at:
      type: string
      format: date-time
      description: |
        ISO 8601 timestamp when the connector was enabled for the agent.
      example: "2026-02-18T10:00:00Z"

  example:
    agent_id: 42
    connector_id: "gmail"
    enabled_at: "2026-02-18T10:00:00Z"

DisableAgentConnectorResponse:
  type: object
  required:
    - agent_id
    - connector_id
    - disabled_at
    - revoked_standing_approvals
  properties:
    agent_id:
      type: integer
      format: int64
      description: |
        Auto-incrementing agent identifier.
      example: 42

    connector_id:
      type: string
      maxLength: 128
      description: |
        Connector identifier that was disabled.
      example: "gmail"

    disabled_at:
      type: string
      format: date-time
      description: |
        ISO 8601 timestamp when the connector was disabled for the agent.
      example: "2026-02-18T12:00:00Z"

    revoked_standing_approvals:
      type: integer
      minimum: 0
      description: |
        Number of active standing approvals that were automatically revoked
        because they referenced action types belonging to this connector.
      example: 2

  example:
    agent_id: 42
    connector_id: "gmail"
    disabled_at: "2026-02-18T12:00:00Z"
    revoked_standing_approvals: 2

AssignCredentialRequest:
  type: object
  description: |
    Assign a credential to an agent-connector pair. Exactly one of `credential_id`
    or `oauth_connection_id` must be provided.
  properties:
    credential_id:
      type: string
      description: Static credential ID to assign.
      example: "cred_abc123"
    oauth_connection_id:
      type: string
      description: OAuth connection ID to assign.
      example: "oc_def456"

CalendarListItem:
  type: object
  required:
    - id
  properties:
    id:
      type: string
      description: Provider calendar identifier (Google calendar ID or Microsoft Graph calendar id).
    summary:
      type: string
      description: Human-readable name (Google Calendar `summary`).
    name:
      type: string
      description: Human-readable name (Microsoft Graph `name`).
    primary:
      type: boolean
      description: True when this is the user's primary Google calendar.
    isDefaultCalendar:
      type: boolean
      description: True when this is the default Microsoft Graph calendar.

AgentConnectorCalendarListResponse:
  type: object
  required:
    - data
  properties:
    data:
      type: array
      items:
        $ref: '../schemas/agent_connectors.yaml#/CalendarListItem'

ChannelListItem:
  type: object
  required:
    - id
    - display_label
  properties:
    id:
      type: string
      description: Slack channel ID (C…, G…, or D…).
    name:
      type: string
      description: Channel name when available (may be empty for some DMs).
    user:
      type: string
      description: For IM channels, the other participant's user ID when present.
    is_private:
      type: boolean
      description: True for private channels (no # prefix in display_label).
    is_im:
      type: boolean
      description: True for direct messages.
    is_mpim:
      type: boolean
      description: True for group direct messages.
    num_members:
      type: integer
      description: Member count when provided by Slack.
    display_label:
      type: string
      description: Human-readable label for pickers (#public-name, private name, DM label).

AgentConnectorChannelListResponse:
  type: object
  required:
    - data
  properties:
    data:
      type: array
      items:
        $ref: '../schemas/agent_connectors.yaml#/ChannelListItem'

UserListItem:
  type: object
  required:
    - id
    - display_label
  properties:
    id:
      type: string
      description: Slack user ID (U…).
    name:
      type: string
      description: Slack username.
    real_name:
      type: string
      description: User's real name.
    display_name:
      type: string
      description: User's display name.
    email:
      type: string
      description: User's email address when available.
    is_bot:
      type: boolean
      description: True for bot users.
    display_label:
      type: string
      description: Human-readable label for pickers (real name with email).

AgentConnectorUserListResponse:
  type: object
  required:
    - data
  properties:
    data:
      type: array
      items:
        $ref: '../schemas/agent_connectors.yaml#/UserListItem'

AgentConnectorCredentialResponse:
  type: object
  required:
    - agent_id
    - connector_id
  properties:
    agent_id:
      type: integer
      format: int64
      description: Agent identifier.
      example: 42
    connector_id:
      type: string
      maxLength: 128
      description: Connector identifier.
      example: "gmail"
    credential_id:
      type: string
      nullable: true
      description: Static credential ID if assigned.
      example: "cred_abc123"
    oauth_connection_id:
      type: string
      nullable: true
      description: OAuth connection ID if assigned.
      example: "oc_def456"

  example:
    agent_id: 42
    connector_id: "gmail"
    oauth_connection_id: "oc_def456"
