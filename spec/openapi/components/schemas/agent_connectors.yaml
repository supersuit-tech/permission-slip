AgentConnectorListResponse:
  type: object
  required:
    - data
  properties:
    data:
      type: array
      items:
        $ref: '../schemas/agent_connectors.yaml#/AgentConnectorSummary'
      description: |
        List of connectors enabled for this agent. Each entry includes the connector
        summary plus when it was enabled.

  example:
    data:
      - id: "gmail"
        name: "Gmail"
        description: "Send and manage emails via Gmail API"
        actions:
          - "email.send"
          - "email.read"
        required_credentials:
          - "gmail"
        enabled_at: "2026-02-18T10:00:00Z"

AgentConnectorSummary:
  allOf:
    - $ref: '../schemas/connectors.yaml#/ConnectorSummary'
    - type: object
      required:
        - enabled_at
      properties:
        enabled_at:
          type: string
          format: date-time
          description: |
            ISO 8601 timestamp when this connector was enabled for the agent.
          example: "2026-02-18T10:00:00Z"

  example:
    id: "gmail"
    name: "Gmail"
    description: "Send and manage emails via Gmail API"
    actions:
      - "email.send"
      - "email.read"
    required_credentials:
      - "gmail"
    enabled_at: "2026-02-18T10:00:00Z"

AgentConnectorResponse:
  type: object
  required:
    - agent_id
    - connector_id
    - enabled_at
  properties:
    agent_id:
      type: integer
      format: int64
      description: |
        Auto-incrementing agent identifier.
      example: 42

    connector_id:
      type: string
      maxLength: 128
      description: |
        Connector identifier that was enabled.
      example: "gmail"

    enabled_at:
      type: string
      format: date-time
      description: |
        ISO 8601 timestamp when the connector was enabled for the agent.
      example: "2026-02-18T10:00:00Z"

  example:
    agent_id: 42
    connector_id: "gmail"
    enabled_at: "2026-02-18T10:00:00Z"

DisableAgentConnectorResponse:
  type: object
  required:
    - agent_id
    - connector_id
    - disabled_at
    - revoked_standing_approvals
  properties:
    agent_id:
      type: integer
      format: int64
      description: |
        Auto-incrementing agent identifier.
      example: 42

    connector_id:
      type: string
      maxLength: 128
      description: |
        Connector identifier that was disabled.
      example: "gmail"

    disabled_at:
      type: string
      format: date-time
      description: |
        ISO 8601 timestamp when the connector was disabled for the agent.
      example: "2026-02-18T12:00:00Z"

    revoked_standing_approvals:
      type: integer
      minimum: 0
      description: |
        Number of active standing approvals that were automatically revoked
        because they referenced action types belonging to this connector.
      example: 2

  example:
    agent_id: 42
    connector_id: "gmail"
    disabled_at: "2026-02-18T12:00:00Z"
    revoked_standing_approvals: 2

AssignCredentialRequest:
  type: object
  description: |
    Assign a credential to an agent-connector pair. Exactly one of `credential_id`
    or `oauth_connection_id` must be provided.
  properties:
    credential_id:
      type: string
      description: Static credential ID to assign.
      example: "cred_abc123"
    oauth_connection_id:
      type: string
      description: OAuth connection ID to assign.
      example: "oc_def456"

AgentConnectorCredentialResponse:
  type: object
  required:
    - agent_id
    - connector_id
  properties:
    agent_id:
      type: integer
      format: int64
      description: Agent identifier.
      example: 42
    connector_id:
      type: string
      maxLength: 128
      description: Connector identifier.
      example: "gmail"
    credential_id:
      type: string
      nullable: true
      description: Static credential ID if assigned.
      example: "cred_abc123"
    oauth_connection_id:
      type: string
      nullable: true
      description: OAuth connection ID if assigned.
      example: "oc_def456"

  example:
    agent_id: 42
    connector_id: "gmail"
    oauth_connection_id: "oc_def456"

UserCalendar:
  type: object
  required:
    - id
    - name
    - is_primary
  properties:
    id:
      type: string
      description: |
        Provider calendar identifier. For Google Calendar this may be `primary` or an
        email-style calendar ID. For Microsoft Graph this is the calendar object ID.
    name:
      type: string
      description: Human-readable calendar name.
    description:
      type: string
      description: Optional subtitle (e.g. owner address for shared calendars).
    is_primary:
      type: boolean
      description: True when this is the user's primary or default calendar.

AgentConnectorCalendarListResponse:
  type: object
  required:
    - data
  properties:
    data:
      type: array
      items:
        $ref: '#/UserCalendar'
      description: |
        Calendars visible to the connected account, sorted for display. Used to populate
        action configuration UI for Google and Microsoft calendar actions.

  example:
    data:
      - id: "primary"
        name: "Primary"
        is_primary: true
      - id: "work@group.calendar.google.com"
        name: "Team Calendar"
        description: "work@example.com"
        is_primary: false
