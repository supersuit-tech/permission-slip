agentConnectors:
  get:
    operationId: listAgentConnectors
    summary: List Agent Connectors
    description: |
      List all connectors enabled for a specific agent. Returns connector summaries
      for each connector the agent is allowed to use.

      Uses session authentication (Supabase JWT) — this is a user-facing endpoint
      for managing per-agent connector enablement through the dashboard.

    tags:
      - Agents

    security:
      - SupabaseSession: []

    parameters:
      - $ref: '../parameters/common.yaml#/AgentId'

    responses:
      '200':
        description: Agent connectors listed successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/agent_connectors.yaml#/AgentConnectorListResponse'
            example:
              connectors:
                - id: "gmail"
                  name: "Gmail"
                  description: "Send and manage emails via Gmail API"
                  actions:
                    - "email.send"
                    - "email.read"
                  required_credentials:
                    - "gmail"
                  enabled_at: "2026-02-18T10:00:00Z"

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: Agent not found or not owned by user
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "agent_not_found"
                message: "Agent not found"
                retryable: false
                trace_id: "trace_xyz789"

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

agentConnectorById:
  put:
    operationId: enableAgentConnector
    summary: Enable Connector for Agent
    description: |
      Enable a connector for a specific agent. Once enabled, the agent can submit
      actions defined by this connector for approval.

      This is idempotent — enabling an already-enabled connector returns 200.

      Uses session authentication (Supabase JWT).

    tags:
      - Agents

    security:
      - SupabaseSession: []

    parameters:
      - $ref: '../parameters/common.yaml#/AgentId'
      - $ref: '../parameters/common.yaml#/ConnectorId'

    responses:
      '200':
        description: Connector enabled for agent (or was already enabled)
        content:
          application/json:
            schema:
              $ref: '../schemas/agent_connectors.yaml#/AgentConnectorResponse'
            example:
              agent_id: 42
              connector_id: "gmail"
              enabled_at: "2026-02-18T10:00:00Z"

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: Agent or connector not found
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "agent_not_found"
                message: "Agent not found"
                retryable: false
                trace_id: "trace_xyz789"

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

  delete:
    operationId: disableAgentConnector
    summary: Disable Connector for Agent
    description: |
      Disable a connector for a specific agent. The agent will no longer be able
      to submit actions from this connector.

      Any active standing approvals for this agent whose action type belongs to
      the disabled connector are automatically **revoked**. This prevents
      forgotten standing approvals from silently reactivating if the connector
      is re-enabled later.

      ### Disabling vs. Removing

      By default this endpoint **disables** the connector — it removes the
      agent-connector association but leaves the user's credentials (API keys)
      and OAuth connections intact so the connector can be re-enabled without
      re-entering credentials.

      Pass `?delete_credentials=true` to also **permanently delete** the API
      key credential assigned to this connector. The credential row and its
      encrypted vault secret are deleted in the same database transaction, so
      the operation is fully atomic — either everything succeeds or nothing
      changes. OAuth connections are unaffected by this flag and must be
      disconnected separately via `DELETE /v1/oauth/connections/{connection_id}`.

      Uses session authentication (Supabase JWT).

    tags:
      - Agents

    security:
      - SupabaseSession: []

    parameters:
      - $ref: '../parameters/common.yaml#/AgentId'
      - $ref: '../parameters/common.yaml#/ConnectorId'
      - name: delete_credentials
        in: query
        required: false
        description: |
          When `true`, permanently delete the API key credential assigned to
          this connector (both the credential record and its encrypted vault
          secret) as part of the same atomic operation. Defaults to `false`.

          Use this when you want a full "remove" — disabling the connector
          **and** discarding saved API keys — rather than a temporary disable
          that preserves credentials for re-enabling later.

          OAuth connections are **not** affected by this flag. To disconnect
          OAuth, call `DELETE /v1/oauth/connections/{connection_id}` separately.
        schema:
          type: boolean

    responses:
      '200':
        description: Connector disabled for agent
        content:
          application/json:
            schema:
              $ref: '../schemas/agent_connectors.yaml#/DisableAgentConnectorResponse'
            example:
              agent_id: 42
              connector_id: "gmail"
              disabled_at: "2026-02-18T12:00:00Z"

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: Agent-connector association not found
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "agent_connector_not_found"
                message: "Connector not enabled for this agent"
                retryable: false
                trace_id: "trace_xyz789"

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

agentConnectorCredential:
  put:
    operationId: assignAgentConnectorCredential
    summary: Assign Credential to Agent Connector
    description: |
      Assign a credential or OAuth connection to an agent-connector pair. This determines
      which credential the agent uses when executing actions through this connector.

      Exactly one of `credential_id` or `oauth_connection_id` must be provided.
      If a credential is already assigned, it is replaced (upsert behavior).

    tags:
      - Agents

    security:
      - SupabaseSession: []

    parameters:
      - $ref: '../parameters/common.yaml#/AgentId'
      - $ref: '../parameters/common.yaml#/ConnectorId'

    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/agent_connectors.yaml#/AssignCredentialRequest'
          examples:
            static_credential:
              summary: Assign a static API key credential
              value:
                credential_id: "cred_abc123"
            oauth_connection:
              summary: Assign an OAuth connection
              value:
                oauth_connection_id: "oc_def456"

    responses:
      '200':
        description: Credential assigned successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/agent_connectors.yaml#/AgentConnectorCredentialResponse'

      '400':
        description: Invalid request (validation errors, invalid references)
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: Agent not found or not owned by user
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

  delete:
    operationId: removeAgentConnectorCredential
    summary: Remove Credential from Agent Connector
    description: |
      Remove the credential binding for an agent-connector pair. After removal,
      the agent falls back to user-global credential resolution for this connector.

    tags:
      - Agents

    security:
      - SupabaseSession: []

    parameters:
      - $ref: '../parameters/common.yaml#/AgentId'
      - $ref: '../parameters/common.yaml#/ConnectorId'

    responses:
      '200':
        description: Credential binding removed
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: "removed"

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: No credential binding found
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

  get:
    operationId: getAgentConnectorCredential
    summary: Get Agent Connector Credential
    description: |
      Get the current credential binding for an agent-connector pair.

    tags:
      - Agents

    security:
      - SupabaseSession: []

    parameters:
      - $ref: '../parameters/common.yaml#/AgentId'
      - $ref: '../parameters/common.yaml#/ConnectorId'

    responses:
      '200':
        description: Credential binding retrieved (fields are null if no binding exists)
        content:
          application/json:
            schema:
              $ref: '../schemas/agent_connectors.yaml#/AgentConnectorCredentialResponse'

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'
