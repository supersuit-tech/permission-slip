adminUsage:
  get:
    summary: Get user usage for billing period
    description: |
      Returns usage metrics for a specific user and billing period. Includes
      request/SMS totals and an optional breakdown by agent, connector, and
      action type.

      Defaults to the authenticated user's current billing period when no
      query parameters are provided.
    operationId: adminGetUsage
    tags:
      - Admin
    security:
      - SupabaseSession: []
    parameters:
      - name: user_id
        in: query
        required: false
        description: User ID to query. Defaults to the authenticated user.
        schema:
          type: string
          format: uuid
      - name: period
        in: query
        required: false
        description: |
          Billing period to query. Accepts `YYYY-MM` (e.g., `2026-03`),
          `YYYY-MM-DD` (e.g., `2026-03-01`), or full ISO 8601 date-time
          (e.g., `2026-03-01T00:00:00Z`). Defaults to the current billing period.
        schema:
          type: string
          format: date-time
    responses:
      '200':
        description: Usage data returned
        content:
          application/json:
            schema:
              $ref: '../schemas/admin_usage.yaml#/AdminUsageResponse'
      '400':
        $ref: '../responses/errors.yaml#/BadRequest'
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

adminTopUsers:
  get:
    summary: Get top users by request count
    description: |
      Returns users with the highest request counts for a billing period,
      ordered by request count descending. Useful for abuse detection and
      identifying heavy users.
    operationId: adminGetTopUsers
    tags:
      - Admin
    security:
      - SupabaseSession: []
    parameters:
      - name: period
        in: query
        required: false
        description: |
          Billing period to query. Accepts `YYYY-MM`, `YYYY-MM-DD`, or
          full ISO 8601 date-time. Defaults to the current billing period.
        schema:
          type: string
          format: date-time
      - name: limit
        in: query
        required: false
        description: Maximum number of users to return (1–100). Defaults to 10.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
    responses:
      '200':
        description: Top users returned
        content:
          application/json:
            schema:
              $ref: '../schemas/admin_usage.yaml#/TopUsersResponse'
      '400':
        $ref: '../responses/errors.yaml#/BadRequest'
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

adminUsageByConnector:
  get:
    summary: Get usage breakdown by connector
    description: |
      Returns aggregate request counts per connector across all users for a
      billing period, ordered by request count descending. Useful for product
      analytics to identify which connectors are most popular.
    operationId: adminGetUsageByConnector
    tags:
      - Admin
    security:
      - SupabaseSession: []
    parameters:
      - name: period
        in: query
        required: false
        description: |
          Billing period to query. Accepts `YYYY-MM`, `YYYY-MM-DD`, or
          full ISO 8601 date-time. Defaults to the current billing period.
        schema:
          type: string
          format: date-time
    responses:
      '200':
        description: Connector usage returned
        content:
          application/json:
            schema:
              $ref: '../schemas/admin_usage.yaml#/ConnectorUsageResponse'
      '400':
        $ref: '../responses/errors.yaml#/BadRequest'
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

adminUsageByAgent:
  get:
    summary: Get usage breakdown by agent for a user
    description: |
      Returns per-agent request counts for a specific user and billing period,
      ordered by request count descending.

      Defaults to the authenticated user's current billing period.
    operationId: adminGetUsageByAgent
    tags:
      - Admin
    security:
      - SupabaseSession: []
    parameters:
      - name: user_id
        in: query
        required: false
        description: User ID to query. Defaults to the authenticated user.
        schema:
          type: string
          format: uuid
      - name: period
        in: query
        required: false
        description: |
          Billing period to query. Accepts `YYYY-MM`, `YYYY-MM-DD`, or
          full ISO 8601 date-time. Defaults to the current billing period.
        schema:
          type: string
          format: date-time
    responses:
      '200':
        description: Agent usage returned
        content:
          application/json:
            schema:
              $ref: '../schemas/admin_usage.yaml#/AgentUsageResponse'
      '400':
        $ref: '../responses/errors.yaml#/BadRequest'
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'
