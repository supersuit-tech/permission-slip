createRegistrationInvite:
  post:
    operationId: createRegistrationInvite
    summary: Create Registration Invite
    description: |
      Creates a new registration invite that can be shared with an agent to
      initiate the registration flow. The returned invite code is single-use
      and expires after the configured TTL.

      Uses session authentication (Supabase JWT) — the user must be logged
      in via the web UI.

    tags:
      - Registration

    security:
      - SupabaseSession: []

    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/registration_invites.yaml#/CreateRegistrationInviteRequest'

    responses:
      '201':
        description: Invite created successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/registration_invites.yaml#/CreateRegistrationInviteResponse'
            example:
              id: "ri_abc123def456"
              invite_code: "PS-ABCD-1234"
              invite_url: "https://app.permissionslip.dev/invite/PS-ABCD-1234"
              status: "active"
              expires_at: "2026-02-19T12:15:00Z"
              created_at: "2026-02-19T12:00:00Z"

      '400':
        description: Invalid request (e.g., expires_in out of range)
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "invalid_request"
                message: "expires_in must be between 60 and 86400 seconds"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '403':
        description: Agent limit reached — user cannot register more agents on their current plan
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "agent_limit_reached"
                message: "Free plan allows up to 3 agents. Upgrade your plan to add more."
                retryable: false
                details:
                  current_count: 3
                  limit: 3
                  plan_id: "free"
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '404':
        description: Profile not found for the authenticated user
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "profile_not_found"
                message: "Profile not found"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'
