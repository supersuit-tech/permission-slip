subscription:
  get:
    summary: Get current subscription
    description: |
      Returns the authenticated user's subscription details including plan info,
      billing period, and current usage metrics.

      Only available when `billing_enabled` is `true` in the server config.
    operationId: getSubscription
    tags:
      - Billing
    security:
      - SupabaseSession: []
    responses:
      '200':
        description: Subscription details returned
        content:
          application/json:
            schema:
              $ref: '../schemas/billing.yaml#/SubscriptionResponse'
            example:
              plan_id: free
              plan_name: Free
              status: active
              current_period_start: '2026-03-01T00:00:00Z'
              current_period_end: '2026-04-01T00:00:00Z'
              has_payment_method: false
              usage:
                request_count: 42
                sms_count: 0
                request_limit: 1000
                over_limit: false
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'
      '404':
        $ref: '../responses/errors.yaml#/NotFound'

checkout:
  post:
    summary: Create checkout session
    description: |
      Creates a Stripe Checkout Session for upgrading from the free plan to
      pay-as-you-go. Returns a URL to redirect the user to Stripe's hosted
      checkout page.

      If the user doesn't have a Stripe Customer yet, one is created automatically.
      If the user is already on a paid plan, returns 409 Conflict.

      Only available when `billing_enabled` is `true` and Stripe is configured.
    operationId: createCheckout
    tags:
      - Billing
    security:
      - SupabaseSession: []
    responses:
      '200':
        description: Checkout session created
        content:
          application/json:
            schema:
              $ref: '../schemas/billing.yaml#/CheckoutResponse'
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'
      '409':
        description: Already subscribed to a paid plan
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
      '502':
        description: Stripe API error
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

webhook:
  post:
    summary: Stripe webhook
    description: |
      Receives and processes Stripe webhook events. This endpoint verifies the
      webhook signature using `STRIPE_WEBHOOK_SECRET` and processes the following
      event types:

      - `checkout.session.completed`: Activates paid subscription after checkout
      - `customer.subscription.updated`: Syncs subscription status changes
      - `customer.subscription.deleted`: Downgrades user to free plan
      - `invoice.payment_failed`: Marks subscription as past_due

      **No authentication required** — security is provided by Stripe's webhook
      signature verification.
    operationId: stripeWebhook
    tags:
      - Billing
    responses:
      '200':
        description: Webhook processed successfully
      '400':
        description: Invalid signature or malformed event
