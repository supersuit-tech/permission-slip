subscription:
  get:
    summary: Get current subscription
    description: |
      Returns the authenticated user's subscription details including plan info,
      billing period, and current usage metrics.

      Only available when `billing_enabled` is `true` in the server config.
    operationId: getSubscription
    tags:
      - Billing
    security:
      - SupabaseSession: []
    responses:
      '200':
        description: Subscription details returned
        content:
          application/json:
            schema:
              $ref: '../schemas/billing.yaml#/SubscriptionResponse'
            example:
              plan_id: free
              plan_name: Free
              status: active
              current_period_start: '2026-03-01T00:00:00Z'
              current_period_end: '2026-04-01T00:00:00Z'
              has_payment_method: false
              can_upgrade: true
              plan_limits:
                max_requests_per_month: 1000
                max_agents: 5
                max_standing_approvals: 10
                max_credentials: 5
                audit_retention_days: 7
              usage:
                request_count: 42
                sms_count: 0
                request_limit: 1000
                over_limit: false
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'
      '404':
        $ref: '../responses/errors.yaml#/NotFound'

checkout:
  post:
    summary: Create checkout session
    description: |
      Creates a Stripe Checkout Session for upgrading from the free plan to
      pay-as-you-go. Returns a URL to redirect the user to Stripe's hosted
      checkout page.

      If the user doesn't have a Stripe Customer yet, one is created automatically.
      If the user is already on a paid plan, returns 409 Conflict.

      Only available when `billing_enabled` is `true` and Stripe is configured.
    operationId: createCheckout
    tags:
      - Billing
    security:
      - SupabaseSession: []
    responses:
      '200':
        description: Checkout session created
        content:
          application/json:
            schema:
              $ref: '../schemas/billing.yaml#/CheckoutResponse'
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'
      '409':
        description: Already subscribed to a paid plan
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
      '502':
        description: Stripe API error
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

usage:
  get:
    summary: Get current usage
    description: |
      Returns a detailed usage breakdown for the current billing period,
      including request counts, overage calculations, and SMS costs.

      Only available when `billing_enabled` is `true` in the server config.
    operationId: getUsage
    tags:
      - Billing
    security:
      - SupabaseSession: []
    responses:
      '200':
        description: Usage details returned
        content:
          application/json:
            schema:
              $ref: '../schemas/billing.yaml#/UsageResponse'
            example:
              period_start: '2026-03-01T00:00:00Z'
              period_end: '2026-04-01T00:00:00Z'
              requests:
                total: 450
                included: 1000
                overage: 0
                overage_cost_cents: 0
              sms:
                total: 12
                cost_cents: 12
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'
      '404':
        $ref: '../responses/errors.yaml#/NotFound'

upgrade:
  post:
    summary: Upgrade to paid plan
    description: |
      Initiates an upgrade to the paid plan by creating a Stripe Checkout Session.
      Returns a URL to redirect the user to Stripe's hosted checkout page.

      This is an alias for `POST /v1/billing/checkout`.

      If the user doesn't have a Stripe Customer yet, one is created automatically.
      If the user is already on a paid plan, returns 409 Conflict.

      Only available when `billing_enabled` is `true` and Stripe is configured.
    operationId: upgradePlan
    tags:
      - Billing
    security:
      - SupabaseSession: []
    responses:
      '200':
        description: Checkout session created
        content:
          application/json:
            schema:
              $ref: '../schemas/billing.yaml#/CheckoutResponse'
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'
      '409':
        description: Already subscribed to a paid plan
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
      '502':
        description: Stripe API error
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

downgrade:
  post:
    summary: Downgrade to free plan
    description: |
      Downgrades the user from a paid plan to the free tier. Validates that
      current resource counts (agents, standing approvals, credentials) are
      within free plan limits before proceeding.

      If the user has a Stripe subscription, it is cancelled immediately.
      Returns 409 if the user is already on the free plan or if resource
      counts exceed free plan limits (with details about which resource and
      the current/allowed counts in the error response).

      Only available when `billing_enabled` is `true` in the server config.
    operationId: downgradePlan
    tags:
      - Billing
    security:
      - SupabaseSession: []
    responses:
      '200':
        description: Successfully downgraded
        content:
          application/json:
            schema:
              $ref: '../schemas/billing.yaml#/DowngradeResponse'
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'
      '404':
        $ref: '../responses/errors.yaml#/NotFound'
      '409':
        description: Already on free plan or resource limits exceeded
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
      '500':
        description: Unable to verify resource counts for limit validation
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
      '502':
        description: Stripe API error
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'

invoices:
  get:
    summary: List invoices
    description: |
      Returns the user's past invoices from Stripe. Up to 24 paid invoices
      are returned, sorted by creation date (most recent first).

      Returns an empty list if the user has no Stripe customer or no invoices.

      Only available when `billing_enabled` is `true` and Stripe is configured.
    operationId: listInvoices
    tags:
      - Billing
    security:
      - SupabaseSession: []
    responses:
      '200':
        description: Invoice list returned
        content:
          application/json:
            schema:
              $ref: '../schemas/billing.yaml#/InvoiceListResponse'
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'
      '502':
        description: Stripe API error
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

webhook:
  post:
    summary: Stripe webhook
    description: |
      Receives and processes Stripe webhook events. This endpoint verifies the
      webhook signature using `STRIPE_WEBHOOK_SECRET` and processes the following
      event types:

      - `checkout.session.completed`: Stores the Stripe subscription ID and
        atomically upgrades the user from free → pay_as_you_go (idempotent —
        duplicate events are safely ignored).
      - `customer.subscription.updated`: Maps the Stripe subscription status
        (active/trialing → active, past_due/unpaid → past_due, other → cancelled)
        to the local subscription status.
      - `customer.subscription.deleted`: Downgrades user to free plan, marks
        status as cancelled, and sets `downgraded_at` to trigger the 7-day
        audit retention grace period.
      - `invoice.payment_failed`: Marks subscription as past_due so the UI can
        prompt the user to update their payment method.

      Always returns 200 to prevent Stripe retries. Event processing failures
      are logged server-side.

      **No authentication required** — security is provided by Stripe's webhook
      signature verification (`STRIPE_WEBHOOK_SECRET` is required in production).
    operationId: stripeWebhook
    tags:
      - Billing
    responses:
      '200':
        description: Webhook processed successfully
      '400':
        description: Invalid signature or malformed event
