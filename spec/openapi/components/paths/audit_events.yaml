exportAuditLogs:
  get:
    operationId: exportAuditLogs
    summary: Export Audit Logs
    description: |
      Returns audit log events in chronological order (oldest first) for the
      authenticated user, starting from the required `since` timestamp. Designed
      for compliance export and SIEM integration use cases.

      Results are filtered by the user's plan retention window (7 days for free,
      90 days for paid). If the `since` parameter is earlier than the retention
      boundary, it is clamped and the response includes `effective_since` with
      the actual start timestamp used. A 7-day grace period applies after
      downgrading from paid to free.

      Supports cursor-based pagination via `limit` and `after` query parameters
      to iterate over large result sets.

    tags:
      - Audit Events

    security:
      - SupabaseSession: []

    parameters:
      - name: since
        in: query
        required: true
        description: |
          Only return events created at or after this timestamp. Must be a valid
          RFC3339 timestamp (e.g. `2026-01-01T00:00:00Z`).
        schema:
          type: string
          format: date-time
        example: "2026-01-01T00:00:00Z"
      - name: until
        in: query
        required: false
        description: |
          Only return events created before this timestamp (exclusive upper bound).
          Must be a valid RFC3339 timestamp and must be after `since`. Useful for
          bounded time-window exports (e.g. monthly compliance reports).
        schema:
          type: string
          format: date-time
        example: "2026-02-01T00:00:00Z"
      - name: event_type
        in: query
        required: false
        description: |
          Filter events by type. Accepts a single type or a comma-separated
          list of types.
        schema:
          type: string
        example: "approval.approved,approval.denied"
      - name: connector_id
        in: query
        required: false
        description: |
          Filter events to a specific connector (e.g. "github", "slack").
          Only returns events where the action was handled by this connector.
        schema:
          type: string
        example: "github"
      - name: limit
        in: query
        required: false
        description: Maximum number of events to return per page (1–1000, default 100).
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        example: 100
      - name: after
        in: query
        required: false
        description: |
          Opaque pagination cursor. Pass the `next_cursor` value from a
          previous response to fetch the next page. Do not construct
          cursor values manually.
        schema:
          type: string
        example: "2026-02-20T14:30:00.123456789Z,12345"

    responses:
      '200':
        description: Audit log events exported successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/audit_events.yaml#/AuditLogExportResponse'
            example:
              data:
                - id: 12345
                  event_type: "approval.approved"
                  timestamp: "2026-02-20T14:30:00Z"
                  agent_id: 42
                  agent_metadata:
                    name: "My AI Assistant"
                  action:
                    type: "email.send"
                    version: "1"
                    parameters:
                      to: "alice@example.com"
                      subject: "Hello"
                  outcome: "approved"
                  source_id: "appr_abc123"
                  connector_id: "email"
                  execution_status: null
                - id: 12346
                  event_type: "standing_approval.executed"
                  timestamp: "2026-02-20T14:35:00Z"
                  agent_id: 42
                  agent_metadata:
                    name: "My AI Assistant"
                  action:
                    type: "email.read"
                    version: "1"
                  outcome: "auto_executed"
                  source_id: "sae_def456"
                  connector_id: "email"
                  execution_status: "success"
              has_more: true
              next_cursor: "2026-02-20T14:35:00.123456789Z,12346"

      '400':
        description: Invalid query parameters
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "invalid_request"
                message: "since query parameter is required (RFC3339 timestamp)"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: Profile not found for the authenticated user
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "profile_not_found"
                message: "Profile not found"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

listAuditEvents:
  get:
    operationId: listAuditEvents
    summary: List Audit Events
    description: |
      Returns a chronological activity feed (newest first) of recent events
      for the authenticated user. Events are sourced from multiple tables:

      - **One-off approvals**: approved, denied, or cancelled approval requests
      - **Standing approval executions**: auto-executed actions via standing approvals
      - **Agent lifecycle**: agent registration and deactivation events

      Results are filtered by the user's plan retention window (7 days for free,
      90 days for paid). The response includes a `retention` object with the
      effective retention days and any active grace period. A 7-day grace period
      applies after downgrading from paid to free.

      Supports cursor-based pagination via `limit` and `after` query parameters,
      and filtering by agent, event type, and outcome.

    tags:
      - Audit Events

    security:
      - SupabaseSession: []

    parameters:
      - name: limit
        in: query
        required: false
        description: Maximum number of events to return (1–100, default 20).
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        example: 20
      - name: after
        in: query
        required: false
        description: |
          Opaque pagination cursor. Pass the `next_cursor` value from a
          previous response to fetch the next page. Do not construct
          cursor values manually.
        schema:
          type: string
        example: "2026-02-20T14:30:00.123456789Z,appr_abc123"
      - name: agent_id
        in: query
        required: false
        description: Filter events to a specific agent by ID.
        schema:
          type: integer
          format: int64
        example: 42
      - name: event_type
        in: query
        required: false
        description: |
          Filter events by type. Accepts a single type or a comma-separated
          list of types.
        schema:
          type: string
        example: "approval.approved,approval.denied"
      - name: outcome
        in: query
        required: false
        description: |
          Filter events by outcome. Accepts a single value (not comma-separated).
        schema:
          type: string
          enum:
            - approved
            - denied
            - cancelled
            - auto_executed
            - registered
            - deactivated
            - pending
            - expired
            - charged
        example: "approved"
      - name: connector_id
        in: query
        required: false
        description: |
          Filter events to a specific connector (e.g. "github", "slack").
          Only returns events where the action was handled by this connector.
        schema:
          type: string
        example: "github"

    responses:
      '200':
        description: Audit events retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/audit_events.yaml#/AuditEventListResponse'
            example:
              data:
                - event_type: "approval.approved"
                  timestamp: "2026-02-20T14:30:00Z"
                  agent_id: 42
                  agent_metadata:
                    name: "My AI Assistant"
                  action:
                    type: "email.send"
                    version: "1"
                    parameters:
                      to: "alice@example.com"
                      subject: "Hello"
                  outcome: "approved"
                  connector_id: "email"
                  execution_status: null
                - event_type: "standing_approval.executed"
                  timestamp: "2026-02-20T14:25:00Z"
                  agent_id: 42
                  agent_metadata:
                    name: "My AI Assistant"
                  action:
                    type: "email.read"
                    version: "1"
                    constraints:
                      sender: "*@mycompany.com"
                  outcome: "auto_executed"
                  connector_id: "email"
                  execution_status: "success"
                - event_type: "agent.registered"
                  timestamp: "2026-02-19T10:00:00Z"
                  agent_id: 43
                  agent_metadata:
                    name: "New Agent"
                  outcome: "registered"
              has_more: true
              next_cursor: "2026-02-19T10:00:00Z,ar:43"

      '400':
        description: Invalid query parameters
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "invalid_request"
                message: "limit must be a positive integer"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: Profile not found for the authenticated user
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "profile_not_found"
                message: "Profile not found"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'
