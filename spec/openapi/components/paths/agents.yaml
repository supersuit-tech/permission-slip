agents:
  get:
    operationId: listAgents
    summary: List Agents
    description: |
      Returns agents owned by the authenticated user in any status
      (pending, registered, deactivated), ordered by creation time
      (newest first). Supports cursor-based pagination via the `limit`
      and `after` query parameters. Uses session authentication (Supabase JWT).

    tags:
      - Agents

    security:
      - SupabaseSession: []

    parameters:
      - name: limit
        in: query
        required: false
        description: Maximum number of agents to return (1–100, default 50).
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
        example: 20
      - name: after
        in: query
        required: false
        description: |
          Opaque pagination cursor. Pass the `next_cursor` value from a
          previous response to fetch the next page. Do not construct
          cursor values manually.
        schema:
          type: string
        example: "2026-02-11T13:15:00.123456Z,42"

    responses:
      '200':
        description: Agents retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/agents.yaml#/AgentListResponse'
            example:
              data:
                - agent_id: 42
                  status: "registered"
                  metadata:
                    name: "My AI Assistant"
                    version: "1.0.0"
                  registered_at: "2026-02-11T13:20:15Z"
                  last_active_at: "2026-02-19T08:45:00Z"
                  request_count_30d: 42
                  created_at: "2026-02-11T13:15:00Z"
                - agent_id: 43
                  status: "pending"
                  request_count_30d: 0
                  created_at: "2026-02-18T10:00:00Z"
              has_more: false

      '400':
        description: Invalid query parameters
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "invalid_request"
                message: "limit must be a positive integer"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: Profile not found for the authenticated user
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "profile_not_found"
                message: "Profile not found"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

agentById:
  get:
    operationId: getAgent
    summary: Get Agent
    description: |
      Returns a single agent by ID. The agent must belong to the authenticated user.

    tags:
      - Agents

    security:
      - SupabaseSession: []

    parameters:
      - $ref: '../parameters/common.yaml#/AgentId'

    responses:
      '200':
        description: Agent retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/agents.yaml#/AgentSummary'
            example:
              agent_id: 42
              status: "registered"
              metadata:
                name: "My AI Assistant"
                version: "1.0.0"
              registered_at: "2026-02-11T13:20:15Z"
              last_active_at: "2026-02-19T08:45:00Z"
              created_at: "2026-02-11T13:15:00Z"

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: Agent not found or not owned by user
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "agent_not_found"
                message: "Agent not found"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

  patch:
    operationId: updateAgent
    summary: Update Agent
    description: |
      Update an agent's metadata (e.g. name, description). The agent must belong
      to the authenticated user.

    tags:
      - Agents

    security:
      - SupabaseSession: []

    parameters:
      - $ref: '../parameters/common.yaml#/AgentId'

    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/agents.yaml#/UpdateAgentRequest'
          example:
            metadata:
              name: "My Renamed Agent"

    responses:
      '200':
        description: Agent updated successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/agents.yaml#/AgentSummary'
            example:
              agent_id: 42
              status: "registered"
              metadata:
                name: "My Renamed Agent"
              registered_at: "2026-02-11T13:20:15Z"
              last_active_at: "2026-02-19T08:45:00Z"
              created_at: "2026-02-11T13:15:00Z"

      '400':
        description: Invalid request body
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "invalid_request"
                message: "metadata is required"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: Agent not found or not owned by user
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "agent_not_found"
                message: "Agent not found"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

deactivateAgent:
  post:
    operationId: deactivateAgent
    summary: Deactivate Agent
    description: |
      Deactivates an agent, preventing it from making further approval requests
      or executing actions. Any active standing approvals for the agent are
      automatically revoked. The agent must belong to the authenticated user.

      Returns 404 if the agent does not exist, does not belong to the
      authenticated user, or is already deactivated.

    tags:
      - Agents

    security:
      - SupabaseSession: []

    parameters:
      - $ref: '../parameters/common.yaml#/AgentId'

    responses:
      '200':
        description: Agent deactivated successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/agents.yaml#/AgentSummary'
            example:
              agent_id: 42
              status: "deactivated"
              metadata:
                name: "My AI Assistant"
              registered_at: "2026-02-11T13:20:15Z"
              deactivated_at: "2026-02-18T09:30:00Z"
              last_active_at: "2026-02-18T08:15:00Z"
              created_at: "2026-02-11T13:15:00Z"

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: Agent not found, not owned by user, or already deactivated
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "agent_not_found"
                message: "Agent not found"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

agentMe:
  get:
    operationId: getAgentSelf
    summary: Get Current Agent
    description: |
      Returns the authenticated agent's own record. This is the primary
      endpoint for an agent to check its own status after registration.

      Requires agent signature authentication via `X-Permission-Slip-Signature`.
      The agent must be in "registered" status.

    tags:
      - Agents

    security:
      - PermissionSlipSignature: []

    responses:
      '200':
        description: Agent record retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/agents.yaml#/AgentSelfResponse'
            example:
              agent_id: 42
              status: "registered"
              metadata:
                name: "My AI Assistant"
                version: "1.0.0"
              registered_at: "2026-02-11T13:20:15Z"
              last_active_at: "2026-02-19T08:45:00Z"
              created_at: "2026-02-11T13:15:00Z"

      '401':
        description: Missing or invalid agent signature
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "invalid_signature"
                message: "Signature verification failed"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '403':
        description: Agent is not in registered status
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "agent_not_authorized"
                message: "Agent is pending, not registered"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

registerAgent:
  post:
    operationId: registerAgentDashboard
    summary: Register Agent (Dashboard)
    description: |
      Complete agent registration from the dashboard. Transitions a pending
      agent to `registered` status and sets `registered_at`. The agent must
      belong to the authenticated user and be in `pending` status.

      This is the dashboard-facing equivalent of the agent-facing
      `POST /v1/agents/{agent_id}/verify` (which uses signature auth and
      confirmation codes). Use this endpoint when the user confirms
      registration directly from the dashboard UI.

      Returns 409 if the agent is already registered or deactivated.

      Emits an `agent.registered` audit event on success.

    tags:
      - Agents

    security:
      - SupabaseSession: []

    parameters:
      - $ref: '../parameters/common.yaml#/AgentId'

    responses:
      '200':
        description: Agent registered successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/agents.yaml#/AgentSummary'
            example:
              agent_id: 42
              status: "registered"
              metadata:
                name: "My AI Assistant"
              registered_at: "2026-02-22T10:30:00Z"
              created_at: "2026-02-11T13:15:00Z"

      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: Agent not found or not owned by user
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "agent_not_found"
                message: "Agent not found"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '409':
        description: Agent is already registered or deactivated
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "agent_already_registered"
                message: "Agent is already registered"
                retryable: false
                trace_id: "trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'

      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'

      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'
