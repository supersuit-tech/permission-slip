credentials:
  post:
    operationId: storeCredential
    summary: Store Credentials
    description: |
      Store API credentials for an external service in Permission Slip's encrypted vault.
      These credentials are used when executing approved actions — Permission Slip calls
      external APIs on behalf of the user using these stored credentials.

      This is a **user-facing endpoint** — users manage credentials through the dashboard,
      not through agents. Agents never see or interact with credentials.

      ## Credential Storage

      - Credentials are encrypted at rest using AES-256-GCM
      - Only decrypted at the moment of action execution
      - Never exposed to agents or included in API responses
      - Users can store multiple credential sets for the same service (e.g., work and personal GitHub tokens)
      - Credentials are user-scoped: the same credential is shared across all of the user's agents

      ## Setup Flow

      1. User checks which credentials are needed: `GET /v1/connectors/{id}`
      2. User stores credentials: `POST /v1/credentials`
      3. Credentials are encrypted and stored in the vault
      4. Actions requiring these credentials can now be executed

      ## Security

      - Request MUST include valid Supabase session JWT (Authorization: Bearer <token>)
      - Credentials are encrypted immediately upon receipt
      - Only the user who stored the credentials can use or delete them

    tags:
      - Credentials

    security:
      - SupabaseSession: []
    
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/credentials.yaml#/StoreCredentialRequest'
          examples:
            api_key:
              summary: Store API key credentials
              value:
                service: "stripe"
                credentials:
                  api_key: "sk_live_abc123xyz..."
                label: "Business Stripe"

            basic_auth:
              summary: Store basic auth credentials
              value:
                service: "jira"
                credentials:
                  username: "admin@company.com"
                  api_token: "ATATT3xFf..."
                label: "Company Jira"
    
    responses:
      '201':
        description: Credentials stored successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/credentials.yaml#/StoreCredentialResponse'
            example:
              id: "cred_abc123"
              service: "stripe"
              label: "Business Stripe"
              created_at: "2026-02-11T10:00:00Z"
      
      '400':
        $ref: '../responses/errors.yaml#/BadRequest'
      
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '403':
        description: Credential limit reached
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "credential_limit_reached"
                message: "Free tier allows up to 5 stored credentials. Upgrade your plan to add more."
                retryable: false
                details:
                  current_count: 5
                  limit: 5
                trace_id: "trace_xyz789"

      '409':
        description: Duplicate credentials for this service/label combination
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "duplicate_credential"
                message: "Credentials already stored for this service with this label"
                retryable: false
                details:
                  service: "stripe"
                  label: "Business Stripe"
                trace_id: "trace_xyz789"
      
      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'
      
      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'
      
      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'
  
  get:
    operationId: listCredentials
    summary: List Stored Credentials
    description: |
      List all stored credentials for the authenticated user. Returns metadata only — 
      credential secrets are never exposed in API responses.
      
      Use this endpoint to check which services the user has connected before submitting 
      actions that require specific credentials.
      
      ## Security

      - Request MUST include valid Supabase session JWT (Authorization: Bearer <token>)
      - Only returns credentials belonging to the authenticated user
      - Secrets are never included in the response

    tags:
      - Credentials

    security:
      - SupabaseSession: []
    
    responses:
      '200':
        description: Credentials listed successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/credentials.yaml#/CredentialListResponse'
            example:
              credentials:
                - id: "cred_abc123"
                  service: "github"
                  label: "Personal Access Token"
                  created_at: "2026-02-11T10:00:00Z"
                - id: "cred_def456"
                  service: "stripe"
                  label: "Business Stripe"
                  created_at: "2026-02-12T14:30:00Z"
                - id: "cred_ghi789"
                  service: "slack"
                  label: "Work Slack"
                  created_at: "2026-02-13T09:15:00Z"
      
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'
      
      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'
      
      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'
      
      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'

credentialById:
  delete:
    operationId: deleteCredential
    summary: Delete Stored Credentials
    description: |
      Delete (revoke) stored credentials for an external service. After deletion, actions 
      requiring these credentials will fail until new credentials are stored.
      
      ## Deletion Behavior
      
      - Credentials are permanently deleted from the encrypted vault
      - Any pending approval requests are NOT affected (they will fail at execution time 
        if credentials are needed)
      - This action is irreversible — credentials must be re-entered to restore access
      
      ## Security

      - Request MUST include valid Supabase session JWT (Authorization: Bearer <token>)
      - Only the user who stored the credentials can delete them

    tags:
      - Credentials

    security:
      - SupabaseSession: []
    
    parameters:
      - $ref: '../parameters/common.yaml#/CredentialId'
    
    responses:
      '200':
        description: Credentials deleted successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/credentials.yaml#/DeleteCredentialResponse'
            example:
              id: "cred_abc123"
              deleted_at: "2026-02-11T15:00:00Z"
      
      '401':
        $ref: '../responses/errors.yaml#/Unauthorized'

      '404':
        description: Credential not found
        content:
          application/json:
            schema:
              $ref: '../schemas/errors.yaml#/ErrorResponse'
            example:
              error:
                code: "credential_not_found"
                message: "Credential ID not found"
                retryable: false
                details:
                  credential_id: "cred_abc123"
                trace_id: "trace_xyz789"
      
      '429':
        $ref: '../responses/errors.yaml#/TooManyRequests'
      
      '500':
        $ref: '../responses/errors.yaml#/InternalServerError'
      
      '503':
        $ref: '../responses/errors.yaml#/ServiceUnavailable'
