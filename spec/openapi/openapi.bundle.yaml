  /v1/oauth/providers:
    get:
      operationId: listOAuthProviders
      summary: List OAuth Providers
      description: |
        Returns all registered OAuth providers and their configuration status.
        This lets the frontend discover which providers are available, which are
        ready to use (have credentials configured), and which need BYOA setup.

        Providers come from three sources:
        - **built_in**: Platform-provided providers (e.g. Google, Microsoft)
        - **manifest**: Declared in a connector manifest (e.g. Salesforce)
        - **byoa**: User-configured (Bring Your Own App)
      tags:
        - OAuth
      security:
        - SupabaseSession: []
      responses:
        '200':
          description: OAuth providers listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthProviderListResponse'
              example:
                providers:
                  - id: google
                    scopes:
                      - openid
                      - https://www.googleapis.com/auth/userinfo.email
                    source: built_in
                    has_credentials: true
                  - id: microsoft
                    scopes:
                      - openid
                      - offline_access
                      - User.Read
                    source: built_in
                    has_credentials: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/oauth/{provider}/authorize:
    get:
      operationId: oauthAuthorize
      summary: Initiate OAuth Authorization
      description: |
        Generates an authorization URL for the given OAuth provider and redirects
        the user's browser to the provider's consent screen. The redirect includes
        a signed CSRF state parameter that ties the flow to the authenticated user.

        After the user grants consent, the provider redirects back to the callback
        endpoint (`GET /v1/oauth/{provider}/callback`) with an authorization code.

        ## Security

        - Request MUST include valid Supabase session JWT (Authorization: Bearer <token>)
        - A signed state token prevents CSRF and session-fixation attacks
        - The provider must have client credentials configured (built-in or BYOA)
      tags:
        - OAuth
      security:
        - SupabaseSession: []
      parameters:
        - name: provider
          in: path
          required: true
          description: The OAuth provider ID (e.g. "google", "microsoft")
          schema:
            type: string
        - name: scope
          in: query
          required: false
          description: Additional OAuth scopes to request beyond the provider defaults
          schema:
            type: array
            items:
              type: string
      responses:
        '307':
          description: Redirects to the OAuth provider's authorization endpoint
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: OAuth provider not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/oauth/{provider}/callback:
    get:
      operationId: oauthCallback
      summary: OAuth Callback
      description: |
        Handles the OAuth provider's redirect after user consent. Validates the
        CSRF state token, exchanges the authorization code for access/refresh
        tokens, encrypts them in the vault, and creates an `oauth_connections` row.

        On success, redirects the user to the frontend settings page with
        `?oauth_status=success`. On failure, redirects with `?oauth_status=error`.

        This endpoint is called by the OAuth provider, not directly by the frontend.
      tags:
        - OAuth
      security:
        - SupabaseSession: []
      parameters:
        - name: provider
          in: path
          required: true
          description: The OAuth provider ID
          schema:
            type: string
        - name: code
          in: query
          required: false
          description: The authorization code from the provider
          schema:
            type: string
        - name: state
          in: query
          required: false
          description: The signed CSRF state token
          schema:
            type: string
        - name: error
          in: query
          required: false
          description: Error code from the provider (e.g. "access_denied")
          schema:
            type: string
        - name: error_description
          in: query
          required: false
          description: Human-readable error description from the provider
          schema:
            type: string
      responses:
        '307':
          description: Redirects to frontend settings page with success/error status
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/oauth/connections:
    get:
      operationId: listOAuthConnections
      summary: List OAuth Connections
      description: |
        Returns all active OAuth connections for the authenticated user. Each
        connection includes the provider, granted scopes, status, and when it
        was established. Tokens are never included in the response.

        ## Security

        - Request MUST include valid Supabase session JWT (Authorization: Bearer <token>)
        - Only returns connections belonging to the authenticated user
      tags:
        - OAuth
      security:
        - SupabaseSession: []
      responses:
        '200':
          description: OAuth connections listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthConnectionListResponse'
              example:
                connections:
                  - provider: google
                    scopes:
                      - openid
                      - https://www.googleapis.com/auth/userinfo.email
                    status: active
                    connected_at: '2026-03-05T10:00:00Z'
                  - provider: microsoft
                    scopes:
                      - openid
                      - offline_access
                      - User.Read
                    status: active
                    connected_at: '2026-03-05T11:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/oauth/connections/{provider}:
    delete:
      operationId: deleteOAuthConnection
      summary: Disconnect OAuth Provider
      description: |
        Disconnects an OAuth provider for the authenticated user. Deletes the
        OAuth connection row and removes the encrypted tokens from the vault.

        After disconnection, any connector actions that depend on this OAuth
        provider will fail until the user re-authorizes.

        ## Security

        - Request MUST include valid Supabase session JWT (Authorization: Bearer <token>)
        - Only the user who created the connection can delete it
      tags:
        - OAuth
      security:
        - SupabaseSession: []
      parameters:
        - name: provider
          in: path
          required: true
          description: The OAuth provider ID to disconnect
          schema:
            type: string
      responses:
        '200':
          description: OAuth provider disconnected successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthDisconnectResponse'
              example:
                provider: google
                disconnected_at: '2026-03-05T15:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: OAuth connection not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/oauth/provider-configs:
    get:
      operationId: listOAuthProviderConfigs
      summary: List BYOA Provider Configs
      description: |
        Returns all BYOA (Bring Your Own App) OAuth provider configurations for
        the authenticated user. Each config indicates that the user has registered
        their own OAuth client credentials for that provider.

        Client secrets are never included in the response — only the provider ID
        and timestamps are returned.

        ## Related Endpoints

        - `GET /v1/oauth/providers` — lists all available providers (built-in + manifest + BYOA)
        - `POST /v1/oauth/provider-configs` — register new BYOA credentials
        - `PUT /v1/oauth/provider-configs/{provider}` — rotate existing credentials
        - `DELETE /v1/oauth/provider-configs/{provider}` — remove BYOA credentials
      tags:
        - OAuth
      security:
        - SupabaseSession: []
      responses:
        '200':
          description: BYOA provider configs listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthProviderConfigListResponse'
              example:
                configs:
                  - provider: salesforce
                    created_at: '2026-03-05T12:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      operationId: createOAuthProviderConfig
      summary: Register BYOA OAuth Credentials
      description: |
        Registers user-provided OAuth client credentials for a provider. The
        provider must already be declared by a built-in config or connector
        manifest — this endpoint only supplies the client ID and secret.

        Client credentials are encrypted in Supabase Vault (AES-256-GCM) and
        never stored in plaintext. The vault secret IDs are stored in the
        `oauth_provider_configs` database table.

        After registration, the provider's OAuth flows will use these credentials
        immediately. Only one config per provider per user is allowed — delete the
        existing config before creating a new one.

        ## Credential Lifecycle

        1. **Register**: `POST /v1/oauth/provider-configs` (this endpoint)
        2. **Rotate**: `PUT /v1/oauth/provider-configs/{provider}`
        3. **Remove**: `DELETE /v1/oauth/provider-configs/{provider}`
      tags:
        - OAuth
      security:
        - SupabaseSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOAuthProviderConfigRequest'
      responses:
        '201':
          description: BYOA provider config created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthProviderConfig'
              example:
                provider: salesforce
                created_at: '2026-03-05T12:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: OAuth provider not found (not declared by any built-in or connector manifest)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: BYOA config already exists for this provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/oauth/provider-configs/{provider}:
    put:
      operationId: updateOAuthProviderConfig
      summary: Update BYOA Provider Config
      description: |
        Replaces the client credentials for an existing BYOA provider config.
        This supports credential rotation without requiring delete + create.

        The old vault secrets are deleted and replaced with new ones atomically.
      tags:
        - OAuth
      security:
        - SupabaseSession: []
      parameters:
        - name: provider
          in: path
          required: true
          description: The OAuth provider ID to update
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOAuthProviderConfigRequest'
      responses:
        '200':
          description: BYOA provider config updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthProviderConfig'
              example:
                provider: salesforce
                created_at: '2026-03-05T12:00:00Z'
                updated_at: '2026-03-05T14:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: BYOA provider config not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      operationId: deleteOAuthProviderConfig
      summary: Delete BYOA Provider Config
      description: |
        Removes the user's BYOA OAuth client credentials for a provider. The
        encrypted vault secrets are deleted along with the database row.

        After deletion, the provider reverts to its built-in or manifest
        configuration (if any). If no built-in credentials exist, the provider
        will require new BYOA credentials before OAuth flows can be initiated.
      tags:
        - OAuth
      security:
        - SupabaseSession: []
      parameters:
        - name: provider
          in: path
          required: true
          description: The OAuth provider ID to delete the config for
          schema:
            type: string
      responses:
        '200':
          description: BYOA provider config deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthProviderConfigDeleteResponse'
              example:
                provider: salesforce
                deleted_at: '2026-03-05T15:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: BYOA provider config not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/payment-methods:
    get:
      tags:
        - Payment Methods
      summary: List stored payment methods
      description: |
        Returns all stored payment methods for the authenticated user, ordered by
        default status (default first) then creation date. Each method includes
        its current monthly spend (rolling 30-day window) and the maximum number
        of payment methods allowed per user.
      operationId: listPaymentMethods
      security:
        - SupabaseSession: []
      responses:
        '200':
          description: Payment methods retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethodListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Payment Methods
      summary: Confirm and store a payment method
      description: |
        Saves a payment method after it has been set up via Stripe Elements.
        The payment_method_id must be a valid Stripe pm_* token returned by the
        SetupIntent confirmation flow on the client.

        **Flow:**
        1. Client calls POST /payment-methods/setup-intent to get a client_secret
        2. Client uses stripe.confirmCardSetup(client_secret) with Stripe Elements
        3. Client calls this endpoint with the resulting pm_* token

        **Constraints:**
        - Maximum 10 payment methods per user (returns 409 if exceeded)
        - Label must be 100 characters or fewer
        - payment_method_id must start with "pm_"
        - Raw card data never touches our servers — only Stripe tokens are stored
      operationId: confirmPaymentMethod
      security:
        - SupabaseSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPaymentMethodRequest'
      responses:
        '201':
          description: Payment method saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/payment-methods/setup-intent:
    post:
      tags:
        - Payment Methods
      summary: Create a SetupIntent for card collection
      description: |
        Creates a Stripe SetupIntent for collecting payment method details
        via Stripe Elements. Returns a client_secret to use with
        stripe.confirmCardSetup() on the frontend.

        If the user does not yet have a Stripe customer record, one is created
        automatically and associated with their subscription.

        The client_secret is single-use and expires after 24 hours.
      operationId: createSetupIntent
      security:
        - SupabaseSession: []
      responses:
        '200':
          description: SetupIntent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupIntentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/payment-methods/{id}:
    patch:
      tags:
        - Payment Methods
      summary: Update a payment method
      description: |
        Update label, spending limits, or default status of a stored payment method.

        **Spending limits:**
        - Values are in cents (e.g. 5000 = $50.00)
        - Per-transaction limit cannot exceed monthly limit
        - Negative values are rejected
        - Use clear_per_transaction_limit / clear_monthly_limit to remove a limit
        - Label must be 100 characters or fewer
      operationId: updatePaymentMethod
      security:
        - SupabaseSession: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePaymentMethodRequest'
      responses:
        '200':
          description: Payment method updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Payment Methods
      summary: Delete a payment method
      description: |
        Removes a stored payment method and detaches it from the Stripe customer.
        The detachment from Stripe is best-effort — the local record is always
        deleted even if the Stripe API call fails.
      operationId: deletePaymentMethod
      security:
        - SupabaseSession: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment method deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletePaymentMethodResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/config:
    get:
      summary: Get server configuration
      description: |
        Returns server-level feature flags that the frontend uses to adapt its UI.

        **`billing_enabled`**: When `false` (the default for self-hosted deployments),
        all users are auto-assigned the unlimited `pay_as_you_go` plan and billing-related
        UI (plan selection, upgrade prompts, usage meters) should be hidden. When `true`,
        the server enforces plan limits and integrates with Stripe for subscription management.

        This endpoint requires authentication but does not require a profile, so it can
        be called during the onboarding flow to determine what UI to show.
      operationId: getConfig
      tags:
        - Config
      security:
        - SupabaseSession: []
      responses:
        '200':
          description: Server configuration returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
              example:
                billing_enabled: false
                stripe_test_mode: false
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/config/vapid-key:
    get:
      summary: Get VAPID public key
      description: |
        Returns the server's VAPID public key, needed by the browser to create
        a Web Push subscription. Requires authentication so VAPID keys aren't
        publicly enumerable.
      operationId: getVAPIDPublicKey
      tags:
        - Push Subscriptions
      security:
        - SupabaseSession: []
      responses:
        '200':
          description: VAPID public key returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VAPIDPublicKeyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
components:
  securitySchemes:
    PermissionSlipSignature:
      type: apiKey
      in: header
      name: X-Permission-Slip-Signature
      description: |
        Cryptographic signature proving agent identity. Required for all Permission Slip 
        endpoints except connector discovery (`GET /v1/connectors`).

        ## Header Format

        ```
        X-Permission-Slip-Signature: agent_id="<agent_id>", algorithm="<algorithm>", timestamp="<unix_timestamp>", signature="<base64url_signature>"
        ```

        ## Fields

        - `agent_id`: Auto-incrementing agent identifier (integer)
        - `algorithm`: Signature algorithm (`Ed25519` or `ECDSA-P256`)
        - `timestamp`: Unix timestamp in seconds (must be within 300 seconds of current time)
        - `signature`: Base64url-encoded signature (no padding)

        ## Canonical Request Format

        The signature is computed over a canonical representation:

        ```
        <HTTP_METHOD>\n
        <PATH>\n
        <QUERY_STRING>\n
        <TIMESTAMP>\n
        <BODY_HASH>
        ```

        ### Canonicalization Rules

        1. **HTTP_METHOD**: Uppercase HTTP verb (e.g., `POST`, `GET`)
        2. **PATH**: URL path component without query string (e.g., `/invite/PS-R7K3-X9M4`)
        3. **QUERY_STRING**: RFC 3986 percent-encoded, sorted parameters (empty string if no params)
           - Sort parameters by name (lexicographic order)
           - Use uppercase hex in percent-encoding (`%2F` not `%2f`)
           - Spaces as `%20` (NOT `+`)
           - Example: `?z=2&a=1` → `"a=1&z=2"`
        4. **TIMESTAMP**: Unix timestamp from signature header
        5. **BODY_HASH**: SHA-256 hash (lowercase hex) of JCS-canonicalized JSON body
           - For JSON: Use RFC 8785 JSON Canonicalization Scheme (JCS)
           - For empty body: `e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855`

        ## Signature Algorithms

        ### Ed25519 (Recommended)

        - Signature: 64-byte raw Ed25519 signature per RFC 8032
        - Base64url encode (no padding) for header transmission

        ### ECDSA-P256 (Optional)

        - Signature: 64-byte IEEE P1363 fixed-length encoding `r || s`
        - Normalized to "low-S" form (s ≤ n/2) per SEC 1
        - Base64url encode (no padding) for header transmission

        ## Replay Protection

        - **Timestamp Window**: Signatures valid for 300 seconds (5 minutes)
        - **Request ID**: All POST endpoints require unique `request_id` in body
        - Permission Slip tracks `request_id` values and rejects duplicates with `409 Conflict`

        ## Example

        ```
        X-Permission-Slip-Signature: agent_id="42", algorithm="Ed25519", timestamp="1770816000", signature="s7Kj9mP0qR3tU5vW8xY1zA2bC4dE6fG9hI0jL3mN5oP7qR9sT1uV3wX5yZ8aB1cD4eF7gH0iJ2kL5mN8oP0qR3s"
        ```
    SupabaseSession:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Supabase session JWT for authenticating frontend users. Used by session-authenticated
        endpoints (profile, credentials management, etc.).

        The JWT is issued by Supabase Auth after a successful OTP login and contains the user's
        UUID in the `sub` claim. The backend validates the token using either the project's JWT
        secret for HS256-signed tokens or Supabase's JWKS for ES256-signed tokens, automatically
        selecting the verification method based on the JWT header (`alg`).

        ## Usage

        ```http
        Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        ```

        ## Key Claims

        - `sub` (string): User UUID (matches `profiles.id`)
        - `exp` (integer): Token expiration (Unix timestamp)
        - `aud` (string): `authenticated`
        - `role` (string): `authenticated`
  schemas:
    RegisterAgentRequest:
      type: object
      required:
        - request_id
        - public_key
      properties:
        request_id:
          type: string
          format: uuid
          maxLength: 64
          description: |
            Unique request identifier for replay protection. UUID v4 recommended. Permission Slip tracks
            this value and rejects duplicate requests with `409 Conflict` error.

            Used for idempotency — if the same request_id is sent multiple times within the
            timestamp window, services return the original response (if successful) or reject.
          example: 6f1a7c30-9b2e-4d91-8c3f-2a4b6c7d8e9f
        public_key:
          type: string
          maxLength: 1024
          pattern: ^(ssh-ed25519|ecdsa-sha2-nistp256) [A-Za-z0-9+/=]+
          description: |
            Agent's public key in OpenSSH format. Used to verify request signatures.

            **Format**: `<algorithm> <base64-key> [optional-comment]`

            **Supported algorithms**:
            - `ssh-ed25519`: Ed25519 public key (recommended)
            - `ecdsa-sha2-nistp256`: ECDSA P-256 public key

            Permission Slip derives the `agent_id` from this public key. The agent uses the
            corresponding private key to sign all subsequent requests.
          example: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFPZj8V7K2mT9Xw4nL5rQ1pY3vN8cM6hU0oB4eW2sR7k
        metadata:
          type: object
          description: |
            Optional agent metadata for display in approval UI and activity logs.
          properties:
            name:
              type: string
              maxLength: 256
              description: Human-readable agent name shown to approvers
              example: My AI Assistant
            version:
              type: string
              maxLength: 32
              pattern: ^\d+\.\d+\.\d+$
              description: Agent version using semantic versioning
              example: 1.0.0
            capabilities:
              type: array
              maxItems: 50
              uniqueItems: true
              items:
                type: string
                maxLength: 64
              description: List of agent capabilities or supported action types
              example:
                - email
                - calendar
                - payments
      example:
        request_id: 6f1a7c30-9b2e-4d91-8c3f-2a4b6c7d8e9f
        public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFPZj8V7K2mT9Xw4nL5rQ1pY3vN8cM6hU0oB4eW2sR7k
        metadata:
          name: My AI Assistant
          version: 1.0.0
          capabilities:
            - email
            - calendar
    RegisterAgentResponse:
      type: object
      required:
        - agent_id
        - expires_at
        - verification_required
      properties:
        agent_id:
          type: integer
          format: int64
          description: |
            Server-assigned agent identifier. The agent should store this value and use it
            in subsequent API calls (e.g., `POST /v1/agents/{agent_id}/verify`).
          example: 42
        expires_at:
          type: string
          format: date-time
          description: |
            ISO 8601 timestamp (RFC 3339 format, UTC) when the pending registration
            expires. Before this time, the agent must submit the confirmation code
            via `POST /v1/agents/{agent_id}/verify` to complete registration.
          example: '2026-02-11T13:25:00Z'
        verification_required:
          type: boolean
          enum:
            - true
          description: |
            Always `true`. Indicates that a confirmation code is required to complete
            registration. The user will see this code on their dashboard after the
            agent registers. The agent must collect the code from the user and submit
            it via `POST /v1/agents/{agent_id}/verify`.
          example: true
        approver:
          allOf:
            - $ref: '#/components/schemas/ApproverInfo'
          description: |
            The user (approver) this agent is registering with. Included so the
            agent knows whose account it's connecting to — especially useful when
            an agent registers with multiple users and needs to distinguish them.
      example:
        agent_id: 42
        expires_at: '2026-02-11T13:25:00Z'
        verification_required: true
        approver:
          username: alice
    VerifyRegistrationRequest:
      type: object
      required:
        - request_id
        - confirmation_code
      properties:
        request_id:
          type: string
          format: uuid
          maxLength: 64
          description: |
            Unique request identifier for replay protection. UUID v4 recommended.
          example: 040dacd3-fbf9-42b3-b58f-0d838502b16e
        confirmation_code:
          type: string
          pattern: ^[A-Za-z2-9]{3}-?[A-Za-z2-9]{3}$
          minLength: 6
          maxLength: 7
          description: |
            6-character confirmation code shown to approver after they approve the registration.

            **Format**:
            - 6 characters from set: `ABCDEFGHJKLMNPQRSTUVWXYZ23456789` (32 chars)
            - Excluded confusing characters: `0`, `O`, `1`, `I`
            - May include hyphen for readability: `XXX-XXX` or `XXXXXX`
            - Case-insensitive (Permission Slip normalizes to uppercase)

            **Security**: Permission Slip enforces a 5 attempt limit. After 5 failed attempts, 
            registration expires and agent must re-register.

            **Examples**: `XK7-M9P`, `XK7M9P`, `xk7-m9p` (all equivalent)
          example: XK7-M9P
      example:
        request_id: 040dacd3-fbf9-42b3-b58f-0d838502b16e
        confirmation_code: XK7-M9P
    VerifyRegistrationResponse:
      type: object
      required:
        - status
        - registered_at
      properties:
        status:
          type: string
          enum:
            - registered
          description: |
            Registration status. Always `registered` for successful verification,
            matching the agent's actual status in the database.
          example: registered
        registered_at:
          type: string
          format: date-time
          description: |
            ISO 8601 timestamp (RFC 3339 format, UTC) when registration was completed.
          example: '2026-02-11T13:20:15Z'
        approver:
          allOf:
            - $ref: '#/components/schemas/ApproverInfo'
          description: |
            The user (approver) this agent is now registered with. The agent should
            store this alongside the `agent_id` to identify which user this
            registration belongs to.
      example:
        status: registered
        registered_at: '2026-02-11T13:20:15Z'
        approver:
          username: alice
    ApprovalRequest:
      type: object
      required:
        - agent_id
        - request_id
        - approver
        - action
        - context
      properties:
        agent_id:
          type: integer
          format: int64
          description: |
            Auto-incrementing agent identifier. MUST match the `agent_id` associated with the
            signing key in the `X-Permission-Slip-Signature` header. If mismatch, Permission Slip
            returns `400 Bad Request` with error code `agent_id_mismatch`.
          example: 42
        request_id:
          type: string
          format: uuid
          maxLength: 64
          description: |
            Unique request identifier for replay protection and idempotency. UUID v4 recommended.

            Permission Slip tracks this value within the timestamp window (300 seconds) and rejects
            duplicate requests with `409 Conflict` error code `duplicate_request_id`.
          example: a925fbe0-db83-4969-9dc5-27f40385f12c
        approver:
          type: string
          pattern: ^[a-zA-Z0-9_-]{1,64}$
          maxLength: 64
          description: |
            Permission Slip username who must approve this action. Must be registered as an
            authorized approver for this agent.

            Returns `404 Not Found` with error code `approver_not_found` if username doesn't
            exist, or `403 Forbidden` with error code `agent_not_authorized` if approver is
            not authorized for this agent.
          example: alice
        configuration_id:
          type: string
          pattern: ^ac_[a-f0-9]{32}$
          maxLength: 36
          description: |
            Optional reference to an action configuration. When provided, Permission Slip
            validates:

            - The configuration exists and belongs to this agent
            - The configuration is active (not disabled)
            - The `action.type` matches the configuration's `action_type`
            - The `action.parameters` comply with the configuration constraints:
              fixed parameters must match exactly, wildcard parameters accept any value

            If the configuration reference is invalid, Permission Slip returns
            `400 Bad Request` with error code `invalid_configuration`. If the
            configuration is disabled, returns `403 Forbidden` with error code
            `configuration_disabled`. If the configuration's `action_type` does not
            match the request's `action.type`, returns `400 Bad Request` with error
            code `configuration_action_type_mismatch`.

            When omitted, the approval request proceeds through the standard flow
            without configuration-based validation.
          example: ac_1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d
        action:
          $ref: '#/components/schemas/Action'
        context:
          $ref: '#/components/schemas/ActionContext'
      example:
        agent_id: 42
        request_id: a925fbe0-db83-4969-9dc5-27f40385f12c
        approver: alice
        configuration_id: ac_1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d
        action:
          type: email.send
          version: '1'
          parameters:
            from: alice@example.com
            to:
              - recipient@example.com
            subject: Hello World
            body: This is a test email.
        context:
          description: Send welcome email to new user
          risk_level: low
          details:
            recipient_count: 1
    ApprovalRequestResponse:
      type: object
      description: |
        Response after submitting an approval request. The agent should use the `approval_id`
        to poll for status and execution results via `GET /v1/approvals/{approval_id}/status`,
        or listen for real-time updates via `GET /v1/approvals/events` (SSE).
      required:
        - approval_id
        - approval_url
        - status
        - expires_at
      properties:
        approval_id:
          type: string
          pattern: ^appr_[a-zA-Z0-9]{6,64}$
          maxLength: 70
          description: |
            Unique approval identifier assigned by Permission Slip. Used to reference this approval
            in subsequent operations (cancel, poll status via `GET /v1/approvals/{approval_id}/status`).
          example: appr_xyz789
        approval_url:
          type: string
          format: uri
          maxLength: 4096
          pattern: ^https://
          description: |
            Primary approval URL (universal link) that the approver must visit to review and
            approve/deny the action. This is the canonical URL that clients MUST support.

            The URL contains context about the approval request and allows the approver to see
            full action details before making a decision.
          example: https://app.permissionslip.dev/permission-slip/approve/appr_xyz789
        alternative_urls:
          $ref: '#/components/schemas/AlternativeUrls'
        status:
          type: string
          enum:
            - pending
          description: |
            Approval status. Always `pending` when first created. Status changes to `approved`
            or `denied` after approver makes a decision.
          example: pending
        expires_at:
          type: string
          format: date-time
          description: |
            ISO 8601 timestamp (RFC 3339 format, UTC) when approval expires. After this time,
            the approval becomes invalid and cannot be approved.

            Typically set to 5 minutes from creation, but may vary based on configuration
            or action risk level.
          example: '2026-02-11T13:25:00Z'
      example:
        approval_id: appr_xyz789
        approval_url: https://app.permissionslip.dev/permission-slip/approve/appr_xyz789
        alternative_urls:
          deeplink: permissionslip://permission-slip/approve/appr_xyz789
          web: https://accounts.permissionslip.dev/permission-slip/approve/appr_xyz789
        status: pending
        expires_at: '2026-02-11T13:25:00Z'
    CancelApprovalRequest:
      type: object
      required:
        - request_id
      properties:
        request_id:
          type: string
          format: uuid
          maxLength: 64
          description: |
            Unique request identifier for replay protection. UUID v4 recommended.
          example: 21d9ec79-6b20-45b9-8695-83537318966d
      example:
        request_id: 21d9ec79-6b20-45b9-8695-83537318966d
    CancelApprovalResponse:
      type: object
      required:
        - status
        - cancelled_at
      properties:
        status:
          type: string
          enum:
            - cancelled
          description: |
            Approval status. Always `cancelled` for successful cancellation.
          example: cancelled
        cancelled_at:
          type: string
          format: date-time
          description: |
            ISO 8601 timestamp (RFC 3339 format, UTC) when the approval was cancelled.
          example: '2026-02-11T13:21:00Z'
      example:
        status: cancelled
        cancelled_at: '2026-02-11T13:21:00Z'
    ApprovalSummary:
      type: object
      description: Summary of an approval request for the dashboard.
      required:
        - approval_id
        - agent_id
        - action
        - context
        - status
        - expires_at
        - created_at
      properties:
        approval_id:
          type: string
          description: Unique approval identifier
          example: appr_xyz789
        agent_id:
          type: integer
          format: int64
          description: Agent that requested the approval
          example: 42
        action:
          $ref: '#/components/schemas/Action'
        context:
          $ref: '#/components/schemas/ActionContext'
        status:
          type: string
          enum:
            - pending
            - approved
            - denied
            - cancelled
          description: Current approval status
          example: pending
        expires_at:
          type: string
          format: date-time
          description: When the approval expires
          example: '2026-02-11T13:25:00Z'
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: When the approval was approved (null if not approved)
        denied_at:
          type: string
          format: date-time
          nullable: true
          description: When the approval was denied (null if not denied)
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          description: When the approval was cancelled (null if not cancelled)
        created_at:
          type: string
          format: date-time
          description: When the approval request was created
          example: '2026-02-11T13:20:00Z'
        execution_status:
          allOf:
            - $ref: '#/components/schemas/ExecutionStatus'
            - nullable: true
              description: |
                Status of the action execution. Only present when status is `approved`.
                Null for pending, denied, or cancelled approvals.
        execution_result:
          $ref: '#/components/schemas/ExecutionResult'
        executed_at:
          $ref: '#/components/schemas/ExecutedAt'
    ApprovalListResponse:
      type: object
      description: Paginated list of approval requests.
      required:
        - data
        - has_more
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalSummary'
        has_more:
          type: boolean
          description: Whether more approvals exist beyond this page.
          example: false
        next_cursor:
          type: string
          description: |
            Opaque cursor to pass as the `after` query parameter to fetch the
            next page. Only present when `has_more` is true. Do not construct
            or parse cursor values — they may change format without notice.
          example: 2026-02-11T13:20:00.123456Z,appr_xyz789
    ApproveApprovalResponse:
      type: object
      required:
        - approval_id
        - status
        - approved_at
        - confirmation_code
        - execution_status
      properties:
        approval_id:
          type: string
          description: Unique approval identifier
          example: appr_xyz789
        status:
          type: string
          enum:
            - approved
          description: Always `approved` for successful approval.
          example: approved
        approved_at:
          type: string
          format: date-time
          description: When the approval was approved
          example: '2026-02-21T10:30:00Z'
        confirmation_code:
          type: string
          description: |
            Ephemeral confirmation code in `XXX-XXX` format. Displayed to the
            approver as a visual receipt and shared with the agent to confirm
            the approval. Generated at approval time and not persisted.
          pattern: ^[A-Z2-9]{3}-[A-Z2-9]{3}$
          example: RK3-P7M
        execution_status:
          $ref: '#/components/schemas/ExecutionStatus'
        execution_result:
          $ref: '#/components/schemas/ExecutionResult'
    DenyApprovalResponse:
      type: object
      required:
        - approval_id
        - status
        - denied_at
      properties:
        approval_id:
          type: string
          description: Unique approval identifier
          example: appr_xyz789
        status:
          type: string
          enum:
            - denied
          description: Always `denied` for successful denial.
          example: denied
        denied_at:
          type: string
          format: date-time
          description: When the approval was denied
          example: '2026-02-21T10:30:00Z'
    ApprovalStatusResponse:
      type: object
      description: |
        Response for agent polling of approval status and execution result.
        Agents use this to check whether their approval has been resolved and,
        if approved, to retrieve the execution result.
      required:
        - approval_id
        - status
      properties:
        approval_id:
          type: string
          description: Unique approval identifier
          example: appr_xyz789
        status:
          type: string
          enum:
            - pending
            - approved
            - denied
            - cancelled
          description: Current status of the approval request.
          example: approved
        approved_at:
          type: string
          format: date-time
          nullable: true
          description: When the approval was approved (null if not yet approved)
          example: '2026-02-21T10:30:00Z'
        denied_at:
          type: string
          format: date-time
          nullable: true
          description: When the approval was denied (null if not denied)
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          description: When the approval was cancelled (null if not cancelled)
        expires_at:
          type: string
          format: date-time
          description: When the approval expires
          example: '2026-02-21T10:35:00Z'
        execution_status:
          allOf:
            - $ref: '#/components/schemas/ExecutionStatus'
            - nullable: true
              description: |
                Status of the action execution. Only present when approval status is `approved`.
                Null when the approval has not been approved yet.
        execution_result:
          $ref: '#/components/schemas/ExecutionResult'
        executed_at:
          $ref: '#/components/schemas/ExecutedAt'
    ActionConfigTemplate:
      type: object
      required:
