paths:
  /v1/connectors:
    get:
      operationId: listConnectors
      summary: List Available Connectors
      description: |
        List all available connectors (external service integrations) that Permission Slip
        supports. Each connector represents an external service (e.g., GitHub, Stripe, Slack)
        and defines which actions are available.

        Agents use this endpoint to discover what actions they can submit for approval. 
        This replaces the old service discovery model — agents don't need to know about 
        individual service URLs, they just query Permission Slip for available actions.

        ## Use Cases

        - **Agent discovery**: Agent queries available actions before submitting approval requests
        - **UI rendering**: Display available integrations to the user
        - **Validation**: Check if a desired action type is supported before attempting it

        ## No Authentication Required

        This endpoint is publicly accessible (no signature required) to allow agents to 
        discover available actions before registration.
      tags:
        - Connectors
      security: []
      responses:
        '200':
          description: Connectors listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorListResponse'
              example:
                connectors:
                  - id: github
                    name: GitHub
                    description: GitHub integration for repository management
                    actions:
                      - github.create_issue
                      - github.merge_pr
                    required_credentials:
                      - github
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/connectors/{connector_id}:
    get:
      operationId: getConnector
      summary: Get Connector Details
      description: |
        Get detailed information about a specific connector, including supported actions 
        with full parameter schemas and required credentials.

        Agents use this endpoint to understand:
        - What actions are available for a given service
        - What parameters each action expects (JSON Schema)
        - What credentials the user needs to have stored
        - Default risk levels for each action

        ## Use Cases

        - **Parameter validation**: Agent validates action parameters before submitting
        - **Schema discovery**: Agent constructs valid action requests based on parameter schemas
        - **Credential checking**: Agent checks if the user has the required credentials

        ## No Authentication Required

        This endpoint is publicly accessible (no signature required) to allow agents to 
        discover action schemas before registration.
      tags:
        - Connectors
      security: []
      parameters:
        - $ref: '#/components/parameters/ConnectorId'
      responses:
        '200':
          description: Connector details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorDetailResponse'
              example:
                id: github
                name: GitHub
                description: GitHub integration for repository management
                actions:
                  - action_type: github.create_issue
                    name: Create Issue
                    description: Create a new issue in a repository
                    risk_level: low
                    parameters_schema:
                      type: object
                      required:
                        - repo
                        - title
                      properties:
                        repo:
                          type: string
                          description: Repository in owner/repo format
                        title:
                          type: string
                          maxLength: 256
                          description: Issue title
                        body:
                          type: string
                          description: Issue body (markdown)
                  - action_type: github.merge_pr
                    name: Merge Pull Request
                    description: Merge an open pull request
                    risk_level: medium
                    parameters_schema:
                      type: object
                      required:
                        - repo
                        - pr
                      properties:
                        repo:
                          type: string
                          description: Repository in owner/repo format
                        pr:
                          type: integer
                          description: Pull request number
                required_credentials:
                  - service: github
                    auth_type: api_key
        '404':
          description: Connector not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: connector_not_found
                  message: Connector not found
                  retryable: false
                  details:
                    connector_id: unknown-service
                  trace_id: trace_xyz789
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /invite/{invite_code}:
    post:
      operationId: registerAgent
      summary: Register Agent via Invite URL
      description: |
        Register a new agent with Permission Slip by POSTing to the invite URL.
        The invite code in the URL path identifies which user the agent is
        registering with — the agent does not need to know the user's username.

        The invite URL is generated by the user from the Permission Slip dashboard
        (`POST /v1/registration-invites`) and shared with the agent. The agent
        POSTs its public key to the URL to begin registration.

        ## Registration Flow

        1. **User generates invite**: Clicks "Add Agent" on dashboard, receives
           invite URL (e.g., `https://app.permissionslip.dev/invite/PS-R7K3-X9M4`)
        2. **User shares URL**: Gives the invite URL to the agent (paste in chat,
           config file, environment variable, etc.)
        3. **Agent POSTs to invite URL**: Sends public key and request ID
        4. **Permission Slip validates**: Verifies the invite code is valid,
           not expired, and not consumed — then creates a pending registration
        5. **Dashboard shows confirmation code**: User sees a 6-character
           confirmation code on their dashboard
        6. **User shares confirmation code**: Communicates the code to the agent
           (out-of-band)
        7. **Agent verifies**: Submits the code to
           `POST /v1/agents/{agent_id}/verify`
        8. **Registration complete**: Agent can now make approval requests

        ## Why no username?

        The invite code already maps to exactly one user in the database. When the
        user generates an invite, the backend stores their `user_id` alongside the
        hashed invite code. When the agent POSTs to the invite URL, the backend
        looks up the invite code and finds the user automatically. Requiring the
        agent to also specify the username would be redundant.

        ## Security

        - Request MUST include valid `X-Permission-Slip-Signature` header
        - The server auto-assigns an `agent_id` (bigint) returned in the response
        - Permission Slip enforces 5-minute timestamp window for signatures
        - Duplicate `request_id` values are rejected within timestamp window
        - Invite codes are single-use, time-limited (default 15 min), and locked
          after 5 failed attempts

        ## Idempotency

        If the same `request_id` is used multiple times (within 300 seconds),
        Permission Slip returns the original response if registration succeeded,
        or rejects with `duplicate_request_id` error.
      tags:
        - Registration
      security:
        - PermissionSlipSignature: []
      parameters:
        - $ref: '#/components/parameters/InviteCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterAgentRequest'
            examples:
              basic:
                summary: Basic registration
                value:
                  request_id: 6f1a7c30-9b2e-4d91-8c3f-2a4b6c7d8e9f
                  public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFPZj8V7K2mT9Xw4nL5rQ1pY3vN8cM6hU0oB4eW2sR7k
              with_metadata:
                summary: Registration with agent metadata
                value:
                  request_id: 7a2b8d41-0c3e-5e02-9d4f-3b5c7d9e0f1a
                  public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFPZj8V7K2mT9Xw4nL5rQ1pY3vN8cM6hU0oB4eW2sR7k
                  metadata:
                    name: My AI Assistant
                    version: 1.0.0
                    capabilities:
                      - email
                      - calendar
                      - payments
      responses:
        '200':
          description: Registration initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterAgentResponse'
              example:
                agent_id: 42
                expires_at: '2026-02-11T13:25:00Z'
                verification_required: true
                approver:
                  username: alice
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid signature or invalid invite code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_signature:
                  summary: Signature verification failed
                  value:
                    error:
                      code: invalid_signature
                      message: Signature verification failed
                      retryable: false
                      trace_id: trace_xyz789
                invalid_invite_code:
                  summary: Invite code does not match
                  value:
                    error:
                      code: invalid_invite_code
                      message: Invite code is not valid
                      retryable: false
                      trace_id: trace_xyz789
        '403':
          description: Agent limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: agent_limit_reached
                  message: Free tier allows up to 3 agents. Upgrade your plan to add more.
                  retryable: false
                  details:
                    current_count: 3
                    limit: 3
                  trace_id: trace_xyz789
        '404':
          description: Invite not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: invite_not_found
                  message: No invite found for this code
                  retryable: false
                  trace_id: trace_xyz789
        '409':
          description: Agent already registered or duplicate request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                already_registered:
                  summary: Agent already registered
                  value:
                    error:
                      code: agent_already_registered
                      message: Agent is already registered
                      retryable: false
                      details:
                        agent_id: 42
                      trace_id: trace_xyz789
                duplicate_request:
                  summary: Duplicate request ID
                  value:
                    error:
                      code: duplicate_request_id
                      message: Request ID already used
                      retryable: false
                      details:
                        request_id: 6f1a7c30-9b2e-4d91-8c3f-2a4b6c7d8e9f
                      trace_id: trace_xyz789
        '410':
          description: Invite expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: invite_expired
                  message: Invite has expired — ask the user to generate a new one
                  retryable: false
                  trace_id: trace_xyz789
        '423':
          description: Invite locked after too many failed attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: invite_locked
                  message: Invite locked after too many failed attempts — ask the user to generate a new one
                  retryable: false
                  details:
                    failed_attempts: 5
                    max_attempts: 5
                  trace_id: trace_xyz789
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/agents/{agent_id}/verify:
    post:
      operationId: verifyRegistration
      summary: Verify Agent Registration
      description: |
        Complete agent registration by submitting the confirmation code shown to the
        user on the Permission Slip dashboard.

        ## Verification Flow

        1. **Agent registers**: POSTs to invite URL (`POST /invite/{invite_code}`)
        2. **Code displayed**: Permission Slip shows 6-character confirmation code
           on the user's dashboard (e.g., `XK7-M9P`)
        3. **User provides code**: User communicates code to agent (out-of-band)
        4. **Agent submits code**: Calls this endpoint with code
        5. **Service verifies**: Checks code matches, hasn't expired, attempts < 5
        6. **Registration complete**: Agent is now registered and can make approval requests

        ## Confirmation Code Format

        - **Length**: 6 characters (may include hyphen for readability: `XXX-XXX`)
        - **Character set**: Uppercase alphanumeric excluding confusing chars (`0`, `O`, `1`, `I`)
        - **Allowed**: `ABCDEFGHJKLMNPQRSTUVWXYZ23456789` (32 characters)
        - **Case-insensitive**: Permission Slip normalizes to uppercase before validation
        - **Examples**: `XK7-M9P`, `XK7M9P`, `xk7-m9p` (all equivalent)

        ## Security

        - **Attempt limit**: 5 incorrect attempts allowed
        - **Lockout**: After 5 failures, registration expires (must re-register)
        - **Timing**: Constant-time comparison to prevent timing attacks
        - **Single-use**: Code invalidated after successful verification
        - **Expiration**: Code expires with registration (typically 5 minutes)

        ## Path Parameter Validation

        The `agent_id` in the URL path MUST match the `agent_id` in the 
        `X-Permission-Slip-Signature` header. If mismatch, Permission Slip returns `400 Bad Request` 
        with error code `agent_id_mismatch`.
      tags:
        - Registration
      security:
        - PermissionSlipSignature: []
      parameters:
        - $ref: '#/components/parameters/AgentIdSigned'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRegistrationRequest'
            examples:
              with_hyphen:
                summary: Code with hyphen
                value:
                  request_id: 040dacd3-fbf9-42b3-b58f-0d838502b16e
                  confirmation_code: XK7-M9P
              without_hyphen:
                summary: Code without hyphen
                value:
                  request_id: 37c7045e-aef3-4ad3-8ce9-1f78a6d59486
                  confirmation_code: XK7M9P
              lowercase:
                summary: Lowercase code (normalized by service)
                value:
                  request_id: 64d245ef-84df-4582-9709-1fe05d5e3b2c
                  confirmation_code: xk7-m9p
      responses:
        '200':
          description: Registration verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyRegistrationResponse'
              example:
                status: registered
                registered_at: '2026-02-11T13:20:15Z'
                approver:
                  username: alice
        '400':
          description: Invalid request or agent ID mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_code_format:
                  summary: Invalid confirmation code format
                  value:
                    error:
                      code: invalid_request
                      message: Invalid confirmation code format
                      retryable: false
                      details:
                        field: confirmation_code
                        expected_format: 6 characters from set A-Z2-9
                      trace_id: trace_xyz789
                agent_id_mismatch:
                  summary: Agent ID in path doesn't match signature header
                  value:
                    error:
                      code: agent_id_mismatch
                      message: Agent ID in path must match signature header
                      retryable: false
                      details:
                        path_agent_id: 42
                        header_agent_id: 43
                      trace_id: trace_xyz789
        '401':
          description: Invalid signature or incorrect code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_signature:
                  summary: Signature verification failed
                  value:
                    error:
                      code: invalid_signature
                      message: Signature verification failed
                      retryable: false
                      trace_id: trace_xyz789
                invalid_code:
                  summary: Incorrect confirmation code
                  value:
                    error:
                      code: invalid_code
                      message: Incorrect confirmation code
                      retryable: false
                      details:
                        attempts_remaining: 4
                      trace_id: trace_xyz789
        '404':
          description: Agent registration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: agent_not_found
                  message: Agent registration not found or expired
                  retryable: false
                  trace_id: trace_xyz789
        '410':
          description: Registration expired or locked out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                expired:
                  summary: Registration TTL elapsed
                  value:
                    error:
                      code: registration_expired
                      message: Registration has expired
                      retryable: false
                      details:
                        expired_at: '2026-02-11T13:25:00Z'
                      trace_id: trace_xyz789
                too_many_attempts:
                  summary: Too many failed code attempts (locked out)
                  value:
                    error:
                      code: verification_locked
                      message: Too many failed verification attempts
                      retryable: false
                      details:
                        failed_attempts: 5
                        max_attempts: 5
                      trace_id: trace_xyz789
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/agents:
    get:
      operationId: listAgents
      summary: List Agents
      description: |
        Returns agents owned by the authenticated user in any status
        (pending, registered, deactivated), ordered by creation time
        (newest first). Supports cursor-based pagination via the `limit`
        and `after` query parameters. Uses session authentication (Supabase JWT).
      tags:
        - Agents
      security:
        - SupabaseSession: []
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of agents to return (1–100, default 50).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 20
        - name: after
          in: query
          required: false
          description: |
            Opaque pagination cursor. Pass the `next_cursor` value from a
            previous response to fetch the next page. Do not construct
            cursor values manually.
          schema:
            type: string
          example: 2026-02-11T13:15:00.123456Z,42
      responses:
        '200':
          description: Agents retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'
              example:
                data:
                  - agent_id: 42
                    status: registered
                    metadata:
                      name: My AI Assistant
                      version: 1.0.0
                    registered_at: '2026-02-11T13:20:15Z'
                    last_active_at: '2026-02-19T08:45:00Z'
                    request_count_30d: 42
                    created_at: '2026-02-11T13:15:00Z'
                  - agent_id: 43
                    status: pending
                    request_count_30d: 0
                    created_at: '2026-02-18T10:00:00Z'
                has_more: false
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: invalid_request
                  message: limit must be a positive integer
                  retryable: false
                  trace_id: trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Profile not found for the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: profile_not_found
                  message: Profile not found
                  retryable: false
                  trace_id: trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/agents/{agent_id}:
    get:
      operationId: getAgent
      summary: Get Agent
      description: |
        Returns a single agent by ID. The agent must belong to the authenticated user.
      tags:
        - Agents
      security:
        - SupabaseSession: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Agent retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSummary'
              example:
                agent_id: 42
                status: registered
                metadata:
                  name: My AI Assistant
                  version: 1.0.0
                registered_at: '2026-02-11T13:20:15Z'
                last_active_at: '2026-02-19T08:45:00Z'
                created_at: '2026-02-11T13:15:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Agent not found or not owned by user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: agent_not_found
                  message: Agent not found
                  retryable: false
                  trace_id: trace_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    patch:
      operationId: updateAgent
      summary: Update Agent
      description: |
        Update an agent's metadata (e.g. name, description). The agent must belong
        to the authenticated user.
      tags:
        - Agents
      security:
        - SupabaseSession: []
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentRequest'
            example:
              metadata:
                name: My Renamed Agent
