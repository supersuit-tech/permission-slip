        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/agents/{agent_id}/standing-approvals:
    get:
      operationId: listStandingApprovals
      summary: List Agent Standing Approvals
      description: |
        List active standing approvals for a specific agent. Standing approvals are
        pre-authorized, constraint-scoped grants that let an agent execute a specific
        action type without per-request human approval.

        Agents use this endpoint to discover which actions they can execute immediately
        (via standing approval) vs. which require the one-off approval flow.

        ## Use Cases

        - **Agent startup**: Agent queries its standing approvals to understand what it can do
        - **Flow selection**: Agent checks if a standing approval covers a desired action before
          deciding whether to use `POST /v1/actions/execute` (standing) or `POST /v1/approvals/request` (one-off)
        - **Status monitoring**: Agent checks remaining executions or expiration times

        ## Filtering

        Only standing approvals with status `active` are returned by default. Expired,
        revoked, and exhausted standing approvals are excluded.

        ## Security

        - Request MUST include valid `X-Permission-Slip-Signature` header
        - The `agent_id` in the URL path MUST match the `agent_id` in the signature header
        - Only standing approvals belonging to the authenticated agent are returned
      tags:
        - Standing Approvals
      security:
        - PermissionSlipSignature: []
      parameters:
        - $ref: '#/components/parameters/AgentIdSigned'
        - name: limit
          in: query
          required: false
          description: |
            Maximum number of standing approvals to return per page.
            Defaults to 50. Must be between 1 and 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 50
        - name: after
          in: query
          required: false
          description: |
            Opaque pagination cursor from a previous response's `next_cursor`
            field. When provided, returns the next page of results after this
            cursor position.
          schema:
            type: string
          example: 2026-02-14T10:30:00.123456789Z,sa_abc123
      responses:
        '200':
          description: Standing approvals listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandingApprovalListResponse'
              example:
                standing_approvals:
                  - standing_approval_id: sa_abc123
                    agent_id: 42
                    user_id: alice
                    action_type: email.read
                    action_version: '1'
                    constraints:
                      sender: '*@github.com'
                      max_results: 10
                    status: active
                    max_executions: null
                    execution_count: 42
                    starts_at: '2026-02-14T00:00:00Z'
                    expires_at: '2026-02-21T00:00:00Z'
                    created_at: '2026-02-14T10:30:00Z'
                    revoked_at: null
                  - standing_approval_id: sa_def456
                    agent_id: 42
                    user_id: alice
                    action_type: email.send
                    action_version: '1'
                    constraints:
                      recipient_pattern: '*@mycompany.com'
                      max_recipients: 5
                    status: active
                    max_executions: 100
                    execution_count: 12
                    starts_at: '2026-02-14T00:00:00Z'
                    expires_at: '2026-05-15T00:00:00Z'
                    created_at: '2026-02-14T10:35:00Z'
                    revoked_at: null
                has_more: true
                next_cursor: 2026-02-14T10:30:00.000000000Z,sa_abc123
        '400':
          description: Invalid request or agent ID mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: agent_id_mismatch
                  message: Agent ID in path must match signature header
                  retryable: false
                  details:
                    path_agent_id: 42
                    header_agent_id: 43
                  trace_id: trace_xyz789
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
