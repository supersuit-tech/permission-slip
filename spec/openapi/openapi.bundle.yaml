  /v1/credentials:
    post:
      operationId: storeCredential
      summary: Store Credentials
      description: |
        Store API credentials for an external service in Permission Slip's encrypted vault.
        These credentials are used when executing approved actions — Permission Slip calls
        external APIs on behalf of the user using these stored credentials.

        This is a **user-facing endpoint** — users manage credentials through the dashboard,
        not through agents. Agents never see or interact with credentials.

        ## Credential Storage

        - Credentials are encrypted at rest using AES-256-GCM
        - Only decrypted at the moment of action execution
        - Never exposed to agents or included in API responses
        - Users can store multiple credential sets for the same service (e.g., work and personal GitHub tokens)
        - Credentials are user-scoped: the same credential is shared across all of the user's agents

        ## Setup Flow

        1. User checks which credentials are needed: `GET /v1/connectors/{id}`
        2. User stores credentials: `POST /v1/credentials`
        3. Credentials are encrypted and stored in the vault
        4. Actions requiring these credentials can now be executed

        ## Security

        - Request MUST include valid Supabase session JWT (Authorization: Bearer <token>)
        - Credentials are encrypted immediately upon receipt
        - Only the user who stored the credentials can use or delete them
      tags:
        - Credentials
      security:
        - SupabaseSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreCredentialRequest'
            examples:
              api_key:
                summary: Store API key credentials
                value:
                  service: stripe
                  credentials:
                    api_key: sk_live_abc123xyz...
                  label: Business Stripe
              basic_auth:
                summary: Store basic auth credentials
                value:
                  service: jira
                  credentials:
                    username: admin@company.com
                    api_token: ATATT3xFf...
                  label: Company Jira
      responses:
        '201':
          description: Credentials stored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreCredentialResponse'
              example:
                id: cred_abc123
                service: stripe
                label: Business Stripe
                created_at: '2026-02-11T10:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Duplicate credentials for this service/label combination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: duplicate_credential
                  message: Credentials already stored for this service with this label
                  retryable: false
                  details:
                    service: stripe
                    label: Business Stripe
                  trace_id: trace_xyz789
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    get:
      operationId: listCredentials
      summary: List Stored Credentials
      description: |
        List all stored credentials for the authenticated user. Returns metadata only — 
        credential secrets are never exposed in API responses.

        Use this endpoint to check which services the user has connected before submitting 
        actions that require specific credentials.

        ## Security

        - Request MUST include valid Supabase session JWT (Authorization: Bearer <token>)
        - Only returns credentials belonging to the authenticated user
        - Secrets are never included in the response
      tags:
        - Credentials
      security:
        - SupabaseSession: []
      responses:
        '200':
          description: Credentials listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialListResponse'
              example:
                credentials:
                  - id: cred_abc123
                    service: github
                    label: Personal Access Token
                    created_at: '2026-02-11T10:00:00Z'
                  - id: cred_def456
                    service: stripe
                    label: Business Stripe
                    created_at: '2026-02-12T14:30:00Z'
                  - id: cred_ghi789
                    service: slack
                    label: Work Slack
                    created_at: '2026-02-13T09:15:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/credentials/{credential_id}:
    delete:
      operationId: deleteCredential
      summary: Delete Stored Credentials
      description: |
        Delete (revoke) stored credentials for an external service. After deletion, actions 
        requiring these credentials will fail until new credentials are stored.

        ## Deletion Behavior

        - Credentials are permanently deleted from the encrypted vault
        - Any pending approval requests are NOT affected (they will fail at execution time 
          if credentials are needed)
        - This action is irreversible — credentials must be re-entered to restore access

        ## Security

        - Request MUST include valid Supabase session JWT (Authorization: Bearer <token>)
        - Only the user who stored the credentials can delete them
      tags:
        - Credentials
      security:
        - SupabaseSession: []
      parameters:
        - $ref: '#/components/parameters/CredentialId'
      responses:
        '200':
          description: Credentials deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteCredentialResponse'
              example:
                id: cred_abc123
                deleted_at: '2026-02-11T15:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: credential_not_found
                  message: Credential ID not found
                  retryable: false
                  details:
                    credential_id: cred_abc123
                  trace_id: trace_xyz789
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/agents/{agent_id}/standing-approvals:
    get:
      operationId: listStandingApprovals
      summary: List Agent Standing Approvals
      description: |
        List active standing approvals for a specific agent. Standing approvals are
        pre-authorized, constraint-scoped grants that let an agent execute a specific
        action type without per-request human approval.

        Agents use this endpoint to discover which actions they can execute immediately
        (via standing approval) vs. which require the one-off approval flow.

        ## Use Cases

        - **Agent startup**: Agent queries its standing approvals to understand what it can do
        - **Flow selection**: Agent checks if a standing approval covers a desired action before
          deciding whether to use `POST /v1/actions/execute` (standing) or `POST /v1/approvals/request` (one-off)
        - **Status monitoring**: Agent checks remaining executions or expiration times

        ## Filtering

        Only standing approvals with status `active` are returned by default. Expired,
        revoked, and exhausted standing approvals are excluded.

        ## Security

        - Request MUST include valid `X-Permission-Slip-Signature` header
        - The `agent_id` in the URL path MUST match the `agent_id` in the signature header
        - Only standing approvals belonging to the authenticated agent are returned
      tags:
        - Standing Approvals
      security:
        - PermissionSlipSignature: []
      parameters:
        - $ref: '#/components/parameters/AgentIdSigned'
        - name: limit
          in: query
          required: false
          description: |
            Maximum number of standing approvals to return per page.
            Defaults to 50. Must be between 1 and 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 50
        - name: after
          in: query
          required: false
          description: |
            Opaque pagination cursor from a previous response's `next_cursor`
            field. When provided, returns the next page of results after this
            cursor position.
          schema:
            type: string
          example: 2026-02-14T10:30:00.123456789Z,sa_abc123
      responses:
        '200':
          description: Standing approvals listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandingApprovalListResponse'
              example:
                standing_approvals:
                  - standing_approval_id: sa_abc123
                    agent_id: 42
                    user_id: alice
                    action_type: email.read
                    action_version: '1'
                    constraints:
                      sender: '*@github.com'
                      max_results: 10
                    status: active
                    max_executions: null
                    execution_count: 42
                    starts_at: '2026-02-14T00:00:00Z'
                    expires_at: '2026-02-21T00:00:00Z'
                    created_at: '2026-02-14T10:30:00Z'
                    revoked_at: null
                  - standing_approval_id: sa_def456
                    agent_id: 42
                    user_id: alice
                    action_type: email.send
                    action_version: '1'
                    constraints:
                      recipient_pattern: '*@mycompany.com'
                      max_recipients: 5
                    status: active
                    max_executions: 100
                    execution_count: 12
                    starts_at: '2026-02-14T00:00:00Z'
                    expires_at: '2026-05-15T00:00:00Z'
                    created_at: '2026-02-14T10:35:00Z'
                    revoked_at: null
                has_more: true
                next_cursor: 2026-02-14T10:30:00.000000000Z,sa_abc123
        '400':
          description: Invalid request or agent ID mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: agent_id_mismatch
                  message: Agent ID in path must match signature header
                  retryable: false
                  details:
                    path_agent_id: 42
                    header_agent_id: 43
                  trace_id: trace_xyz789
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: agent_not_found
                  message: Agent is not registered
                  retryable: false
                  details:
                    agent_id: 42
                  trace_id: trace_xyz789
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
