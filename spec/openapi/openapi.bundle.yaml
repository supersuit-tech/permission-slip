    VAPIDPublicKeyResponse:
      type: object
      description: The server's VAPID public key for Web Push subscription.
      required:
        - public_key
      properties:
        public_key:
          type: string
          description: Base64url-encoded VAPID public key
          example: BNx...
    Action:
      type: object
      required:
        - type
        - parameters
      properties:
        type:
          type: string
          maxLength: 128
          description: |
            Action type identifier. Determines the structure and semantics of the parameters.

            ## Naming Patterns

            ### Standard Types (2 segments)
            Reserved for future protocol standardization. Format: `<category>.<operation>`

            - Pattern: `^[a-z][a-z0-9_]*\.[a-z][a-z0-9_]*$`
            - Max length: 64 characters
            - Examples: `email.send`, `payment.charge`, `data.delete`, `calendar.create`

            ### Custom Types (4+ segments)
            Service-specific types using reverse-DNS notation.

            - Pattern: Domain (2+ segments) + category + operation = 4+ segments total
            - Max length: 128 characters
            - Examples: 
              - `com.example.deploy.production` (4 segments)
              - `io.github.repo.delete` (4 segments)
              - `org.acme.internal.admin_action` (4 segments)

            Permission Slip validates action types and returns `400 Bad Request` with error code 
            `invalid_action_type` for invalid formats, or `unsupported_action_type` for 
            types not supported by any installed connector.
          example: email.send
        version:
          type: string
          pattern: ^\d+$
          default: '1'
          maxLength: 10
          description: |
            Action type version. Must be a positive integer as a string. Default is `"1"`.

            Increment version when making breaking changes to parameter structure or semantics. 
            Non-breaking additions (new optional parameters) do not require version increment.

            Permission Slip validates supported versions and returns `400 Bad Request` with error code 
            `unsupported_action_version` for unsupported versions.
          example: '1'
        parameters:
          type: object
          additionalProperties: true
          description: |
            Action-specific parameters. Structure is defined by the action type and version.

            Permission Slip validates parameters against the expected schema for the action type. 
            The parameters object is hashed (using RFC 8785 JSON Canonicalization Scheme) and 
            included in approval tokens as `params_hash` to prevent parameter tampering.

            **Security**: Permission Slip verifies that request parameters match the params_hash 
            in the approval token before executing actions.
          example:
            from: alice@example.com
            to:
              - recipient@example.com
            subject: Hello World
            body: This is a test email.
      example:
        type: email.send
        version: '1'
        parameters:
          from: alice@example.com
          to:
            - recipient@example.com
          subject: Hello World
          body: This is a test email.
    ActionContext:
      type: object
      required:
        - description
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 500
          description: |
            Brief human-readable description of what the action will do. Shown to approver in 
            the approval UI. Should be clear and specific enough for the approver to make an 
            informed decision.
          example: Send welcome email to new user
        risk_level:
          type: string
          enum:
            - low
            - medium
            - high
          description: |
            Risk level assessment of the action. Helps approvers understand the potential impact.

            - **low**: Minimal impact, easily reversible (e.g., send email, read data)
            - **medium**: Moderate impact, some consequences (e.g., update database, post to social media)
            - **high**: Significant impact, hard to reverse (e.g., delete data, make payment, deploy to production)
          example: low
        details:
          type: object
          additionalProperties: true
          description: |
            Additional context for the approver. Structure is flexible and action-specific. 
            Use for metadata that helps the approver understand the action without exposing 
            sensitive data.

            Examples:
            - `recipient_count`: Number of email recipients
            - `estimated_cost`: Estimated cost of a payment action
            - `affected_resources`: List of resources that will be modified
          example:
            recipient_count: 1
            estimated_time: 5 minutes
      example:
        description: Send welcome email to new user
        risk_level: low
        details:
          recipient_count: 1
          estimated_time: 5 minutes
    ApprovalToken:
      type: object
      required:
        - access_token
        - expires_at
        - scope
        - scope_version
      properties:
        access_token:
          type: string
          format: jwt
          description: |
            Single-use JWT bearer token for executing the approved action. The token is signed 
            by Permission Slip using ES256 (ECDSA P-256).

            ## Token Structure

            ### Header
            ```json
            {
              "alg": "ES256",
              "typ": "JWT",
              "kid": "key-2026-01"
            }
            ```

            ### Payload
            - `sub` (string): Agent ID
            - `aud` (string): `permissionslip.dev`
            - `approver` (string): Username who approved
            - `approval_id` (string): Approval request ID
            - `scope` (string): Action type (e.g., `email.send`)
            - `scope_version` (string): Action version (e.g., `"1"`)
            - `params_hash` (string): SHA-256 hash of JCS-canonicalized parameters
            - `iat` (integer): Issued at (Unix timestamp)
            - `exp` (integer): Expires at (Unix timestamp)
            - `jti` (string): Unique token ID (for single-use enforcement)

            ## Usage

            Pass this token in the `token` field when calling `POST /v1/actions/execute`. 
            Permission Slip validates the token and executes the approved action using the 
            user's stored credentials.

            ## Token Lifecycle

            - **Single-use**: Consumed after first successful use (enforced via `jti` claim)
            - **Expiration**: Typically 5 minutes (matches approval TTL)
            - **No refresh**: Protocol does not support token refresh
            - **Retry guidance**: Use immediately; request new approval if expired or already used
          example: eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9..signature
        expires_at:
          type: string
          format: date-time
          description: |
            ISO 8601 timestamp (RFC 3339 format, UTC) when the token expires. After this time, 
            the token is invalid and services will reject it with `401 Unauthorized` error code 
            `invalid_token`.

            Typically matches the approval request expiration (5 minutes from approval time).
          example: '2026-02-11T13:25:45Z'
        scope:
          type: string
          maxLength: 128
          description: |
            Action type this token authorizes. Must match the `type` from the approval request.
            Permission Slip verifies this matches the `action_id` in the execute request.
          example: email.send
        scope_version:
          type: string
          pattern: ^\d+$
          maxLength: 10
          description: |
            Action type version this token authorizes. Must match the `version` from the approval 
            request.
          example: '1'
      example:
        access_token: eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9...
        expires_at: '2026-02-11T13:25:45Z'
        scope: email.send
        scope_version: '1'
    AlternativeUrls:
      type: object
      description: |
        Optional alternative URL formats for platform-specific deep linking. If omitted, clients 
        MUST use the primary URL (registration_url or approval_url).
      properties:
        deeplink:
          type: string
          format: uri
          maxLength: 4096
          description: |
            Native app deep link URL. Opens directly in the mobile app if installed, bypassing 
            the browser. Uses custom URI scheme (e.g., `permissionslip://`) or universal link.
          example: permissionslip://permission-slip/approve?token=eyJ...
        web:
          type: string
          format: uri
          maxLength: 4096
          pattern: ^https://
          description: |
            Web-only URL that opens in browser. Useful for separating web authentication flow 
            from mobile app flow, or for services with multiple web domains.
          example: https://accounts.permissionslip.dev/permission-slip/approve?token=eyJ...
      example:
        deeplink: permissionslip://permission-slip/approve?token=eyJ...
        web: https://accounts.permissionslip.dev/permission-slip/approve?token=eyJ...
    Error:
      type: object
      required:
        - code
        - message
        - retryable
      properties:
        code:
          type: string
          maxLength: 64
          description: |
            Machine-readable error code. Used by clients to programmatically handle specific 
            error conditions.

            See error code reference in API specification for complete list and descriptions.
          enum:
            - invalid_request
            - invalid_action_type
            - unsupported_action_type
            - unsupported_action_version
            - agent_id_mismatch
            - invalid_public_key
            - invalid_signature
            - timestamp_expired
            - invalid_code
            - invalid_token
            - agent_not_authorized
            - approval_denied
            - token_already_used
            - insufficient_scope
            - invalid_parameters
            - agent_not_found
            - approver_not_found
            - approval_not_found
            - credential_not_found
            - connector_not_found
            - agent_connector_not_found
            - credentials_not_found
            - no_matching_standing_approval
            - standing_approval_exhausted
            - constraint_violation
            - standing_approval_expired
            - agent_already_registered
            - duplicate_request_id
            - approval_already_resolved
            - duplicate_credential
            - registration_expired
            - verification_locked
            - approval_expired
            - rate_limited
            - internal_error
            - upstream_error
            - service_unavailable
          example: invalid_signature
        message:
          type: string
          maxLength: 500
          description: |
            Human-readable error message. Provides context about what went wrong and may include 
            suggestions for how to fix it.
          example: Signature verification failed
        retryable:
          type: boolean
          description: |
            Indicates whether the client should retry the request. 

            - `true`: Transient error, retry with exponential backoff (e.g., rate limiting, server error)
            - `false`: Permanent error, do not retry (e.g., invalid request, expired signature)
          example: false
        details:
          type: object
          additionalProperties: true
          description: |
            Optional additional error context. Structure is error-specific and may include 
            information like validation failures, expired timestamps, or resource identifiers.
          example:
            field: confirmation_code
            attempts_remaining: 4
        trace_id:
          type: string
          maxLength: 128
          description: |
            Optional server-generated trace or correlation ID for debugging and support requests. 
            This is distinct from the client-supplied `request_id` in approval requests.

            Clients SHOULD include this value when contacting support about errors.
          example: trace_xyz789
        retry_after:
          type: integer
          minimum: 1
          description: |
            Present only for `rate_limited` errors. Number of seconds the client should wait 
            before retrying the request.
          example: 60
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/Error'
      example:
        error:
          code: invalid_signature
          message: Signature verification failed
          retryable: false
          details:
            timestamp: '1770816000'
            expected_window: 300 seconds
          trace_id: trace_xyz789
    AgentListResponse:
      type: object
      description: Paginated list of agents.
      required:
        - data
        - has_more
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AgentSummary'
        has_more:
          type: boolean
          description: Whether more agents exist beyond this page.
          example: false
        next_cursor:
          type: string
          description: |
            Opaque cursor to pass as the `after` query parameter to fetch the
            next page. Only present when `has_more` is true. Do not construct
            or parse cursor values — they may change format without notice.
          example: 2026-02-11T13:15:00.123456Z,42
  parameters:
    ActionConfigId:
      name: config_id
      in: path
      required: true
      description: |
        Unique action configuration identifier assigned by Permission Slip.

        Format: `ac_` prefix followed by 32 hex characters.
      schema:
        type: string
        pattern: ^ac_[a-f0-9]{32}$
        maxLength: 36
      example: ac_1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d
    AgentId:
      name: agent_id
      in: path
      required: true
      description: |
        Auto-incrementing agent identifier (bigint). Returned in agent creation
        and list responses.
      schema:
        type: integer
        format: int64
      example: 42
    AgentIdSigned:
      name: agent_id
      in: path
      required: true
      description: |
        Auto-incrementing agent identifier (bigint). Returned in agent creation
        and list responses.

        MUST match the `agent_id` in the `X-Permission-Slip-Signature` header.
        Permission Slip verifies this matches the `agent_id` in the signature
        header. If mismatch, returns `400 Bad Request` with error code
        `agent_id_mismatch`.
      schema:
        type: integer
        format: int64
      example: 42
    ApprovalId:
      name: approval_id
      in: path
      required: true
      description: |
        Unique approval identifier assigned by Permission Slip when the approval request was created.

        Format: `appr_` prefix followed by alphanumeric characters.

        **Usage**: Used to reference this specific approval in subsequent operations (verify, cancel).
      schema:
        type: string
        pattern: ^appr_[a-zA-Z0-9]{6,64}$
        maxLength: 70
      example: appr_xyz789
    CredentialId:
      name: credential_id
      in: path
      required: true
      description: |
        Unique credential identifier assigned by Permission Slip when the credential was stored.

        Format: `cred_` prefix followed by alphanumeric characters.
      schema:
        type: string
        pattern: ^cred_[a-zA-Z0-9]{6,64}$
        maxLength: 70
      example: cred_abc123
    ConnectorId:
      name: connector_id
      in: path
      required: true
      description: |
        Unique connector identifier. Use the `id` field from the connector list response.
      schema:
        type: string
        maxLength: 128
        pattern: ^[a-z][a-z0-9_.-]*$
      example: gmail
    InviteCode:
      name: invite_code
      in: path
      required: true
      description: |
        Single-use invite code in the format `PS-XXXX-XXXX`. Generated by a user
        from the Permission Slip dashboard and shared with the agent. The code
        identifies which user the agent is registering with — the agent does not
        need to know the user's username.
      schema:
        type: string
        pattern: ^PS-[A-Z2-9]{4}-[A-Z2-9]{4}$
        maxLength: 12
      example: PS-R7K3-X9M4
    StandingApprovalId:
      name: standing_approval_id
      in: path
      required: true
      description: |
        Unique standing approval identifier assigned by Permission Slip.
      schema:
        type: string
        pattern: ^sa_[a-zA-Z0-9]{6,64}$
        maxLength: 70
      example: sa_abc123
    PushSubscriptionId:
      name: subscription_id
      in: path
      required: true
      description: Push subscription ID (auto-incrementing integer).
      schema:
        type: integer
        format: int64
      example: 1
  responses:
    BadRequest:
      description: Bad Request - Invalid or malformed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid_request:
              summary: Generic invalid request
              value:
                error:
                  code: invalid_request
                  message: Malformed request body
                  retryable: false
                  details:
                    field: request_id
                    reason: Field is required
                  trace_id: trace_xyz789
            invalid_public_key:
              summary: Invalid public key format
              value:
                error:
                  code: invalid_public_key
                  message: Public key format is invalid
                  retryable: false
                  details:
                    expected_format: ssh-ed25519 or ecdsa-sha2-nistp256
                  trace_id: trace_xyz789
            agent_id_mismatch:
              summary: Agent ID mismatch
              value:
                error:
                  code: agent_id_mismatch
                  message: Agent ID in request body/path must match signature header
                  retryable: false
                  details:
                    body_agent_id: 42
                    header_agent_id: 43
                  trace_id: trace_xyz789
    Unauthorized:
      description: Unauthorized - Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid_signature:
              summary: Signature verification failed
              value:
                error:
                  code: invalid_signature
                  message: Signature verification failed
                  retryable: false
                  trace_id: trace_xyz789
            timestamp_expired:
              summary: Request timestamp outside acceptable window
              value:
                error:
                  code: timestamp_expired
                  message: Request timestamp is outside the acceptable window
                  retryable: false
                  details:
                    timestamp: '1770816000'
                    current_time: '1770816600'
                    max_age_seconds: 300
                  trace_id: trace_xyz789
            invalid_token:
              summary: JWT token invalid or expired
              value:
                error:
