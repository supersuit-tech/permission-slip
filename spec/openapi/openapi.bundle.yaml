        parameters:
          type: object
          additionalProperties: true
          description: |
            Pre-configured parameter values. Uses the same constraint syntax as
            action configurations: fixed values, `"*"` wildcards, and
            `{"$pattern": "<glob>"}` patterns.
          example:
            owner: '*'
            repo: '*'
            title: '*'
            body: '*'
        created_at:
          type: string
          format: date-time
