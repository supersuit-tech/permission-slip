  /v1/audit-events:
    get:
      operationId: listAuditEvents
      summary: List Audit Events
      description: |
        Returns a chronological activity feed (newest first) of recent events
        for the authenticated user. Events are sourced from multiple tables:

        - **One-off approvals**: approved, denied, or cancelled approval requests
        - **Standing approval executions**: auto-executed actions via standing approvals
        - **Agent lifecycle**: agent registration and deactivation events

        Supports cursor-based pagination via `limit` and `after` query parameters,
        and filtering by agent, event type, and outcome.
      tags:
        - Audit Events
      security:
        - SupabaseSession: []
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of events to return (1–100, default 20).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: after
          in: query
          required: false
          description: |
            Opaque pagination cursor. Pass the `next_cursor` value from a
            previous response to fetch the next page. Do not construct
            cursor values manually.
          schema:
            type: string
          example: 2026-02-20T14:30:00.123456789Z,appr_abc123
        - name: agent_id
          in: query
          required: false
          description: Filter events to a specific agent by ID.
          schema:
            type: integer
            format: int64
          example: 42
        - name: event_type
          in: query
          required: false
          description: |
            Filter events by type. Accepts a single type or a comma-separated
            list of types.
          schema:
            type: string
          example: approval.approved,approval.denied
        - name: outcome
          in: query
          required: false
          description: |
            Filter events by outcome. Accepts a single value (not comma-separated).
          schema:
            type: string
            enum:
              - approved
              - denied
              - cancelled
              - auto_executed
              - registered
              - deactivated
              - pending
              - expired
          example: approved
      responses:
        '200':
          description: Audit events retrieved successfully
