name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: permission_slip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/permission_slip_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Ensure frontend/dist exists for go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep

      - name: Run backend tests
        run: |
          set +e
          go test -v ./... 2>&1 | tee /tmp/test-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            # Surface failing tests as annotations so they show up on the check run
            # (CI logs aren't always readable from automation; this gives us a
            # fallback signal via the annotations API). Delete this block once
            # CI is stable.
            grep -E "^--- FAIL:|^FAIL\t" /tmp/test-output.log | head -50 | while IFS= read -r line; do
              echo "::error::${line}"
            done
            # Also dump first 30 FAIL lines with some context for human reviewers.
            grep -B1 -A5 -E "^--- FAIL:" /tmp/test-output.log | head -300 || true
          fi
          exit $EXIT_CODE

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Generate API client
        run: make generate-frontend

      - name: Verify bundled OpenAPI spec is up-to-date
        run: |
          make bundle
          if ! git diff --exit-code spec/openapi/openapi.bundle.yaml; then
            echo "::error::spec/openapi/openapi.bundle.yaml is out of date. Run 'make bundle' and commit the result."
            exit 1
          fi

      - name: Run frontend tests
        run: make test-frontend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [backend, frontend, build]
    if: ${{ failure() && github.event_name == 'push' }}
    steps:
      - name: Send SNS SMS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          SNS_PHONE_TO: ${{ secrets.SNS_PHONE_TO }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          TITLE: ${{ github.workflow }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ] || [ -z "$AWS_DEFAULT_REGION" ]; then
            echo "::warning::AWS credentials/region not configured, skipping SNS SMS"
            exit 0
          fi
          if [ -z "$SNS_PHONE_TO" ]; then
            echo "::warning::SNS_PHONE_TO secret is not set, skipping SMS"
            exit 0
          fi
          MESSAGE="permission-slip CI failed: ${TITLE} on ${BRANCH} — ${RUN_URL}"

          aws sns publish \
            --phone-number "${SNS_PHONE_TO}" \
            --message "${MESSAGE}" \
            --message-attributes '{"AWS.SNS.SMS.SMSType":{"DataType":"String","StringValue":"Transactional"}}'

      - name: Send webhook notification
        if: always()
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          NOTIFY_WEBHOOK_SECRET: ${{ secrets.NOTIFY_WEBHOOK_SECRET }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$NOTIFY_WEBHOOK_URL" ]; then
            echo "::warning::NOTIFY_WEBHOOK_URL secret is not set, skipping webhook"
            exit 0
          fi
          MESSAGE="permission-slip: CI failed on ${BRANCH} — investigate: ${RUN_URL}"
          PAYLOAD=$(jq -n --arg msg "$MESSAGE" --arg secret "$NOTIFY_WEBHOOK_SECRET" \
            '{message: $msg, secret: $secret}')
          curl -s -f -X POST "$NOTIFY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
