name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: permission_slip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/permission_slip_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Ensure frontend/dist exists for go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep

      - name: Run backend tests
        run: go test ./...

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Generate API client
        run: make generate-frontend

      - name: Verify bundled OpenAPI spec is up-to-date
        run: |
          make bundle
          if ! git diff --exit-code spec/openapi/openapi.bundle.yaml; then
            echo "::error::spec/openapi/openapi.bundle.yaml is out of date. Run 'make bundle' and commit the result."
            exit 1
          fi

      - name: Run frontend tests
        run: make test-frontend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [backend, frontend, build]
    if: ${{ failure() && github.event_name == 'push' }}
    steps:
      - name: Send Twilio SMS
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_FROM: ${{ secrets.TWILIO_PHONE_FROM }}
          TWILIO_PHONE_TO: ${{ secrets.TWILIO_PHONE_TO }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.ref_name }}"
          TITLE="${{ github.workflow }}"
          MESSAGE="permission-slip CI failed: ${TITLE} on ${BRANCH} — ${RUN_URL}"

          curl -s -f -X POST \
            "https://api.twilio.com/2010-04-01/Accounts/${TWILIO_ACCOUNT_SID}/Messages.json" \
            -u "${TWILIO_ACCOUNT_SID}:${TWILIO_AUTH_TOKEN}" \
            --data-urlencode "To=${TWILIO_PHONE_TO}" \
            --data-urlencode "From=${TWILIO_PHONE_FROM}" \
            --data-urlencode "Body=${MESSAGE}"

      - name: Send webhook notification
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          NOTIFY_WEBHOOK_SECRET: ${{ secrets.NOTIFY_WEBHOOK_SECRET }}
        run: |
          if [ -z "$NOTIFY_WEBHOOK_URL" ]; then
            echo "::warning::NOTIFY_WEBHOOK_URL secret is not set, skipping webhook"
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="permission-slip: CI failed on ${{ github.ref_name }} — investigate: ${RUN_URL}"
          PAYLOAD=$(jq -n --arg msg "$MESSAGE" --arg secret "$NOTIFY_WEBHOOK_SECRET" \
            '{message: $msg, secret: $secret}')
          curl -s -f -X POST "$NOTIFY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
