name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: permission_slip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/permission_slip_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Ensure frontend/dist exists for go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep

      - name: Run go build
        id: gobuild
        run: |
          go build ./... 2>&1 | tee /tmp/gobuild.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post build error
        if: steps.gobuild.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/gobuild.log', 'utf8').slice(0, 5000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || 321,
              body: `## Build Failed\n\`\`\`\n${log}\n\`\`\``
            });
            core.setFailed('go build failed');

      - name: Run go vet
        if: steps.gobuild.outcome == 'success'
        id: govet
        run: |
          go vet ./... 2>&1 | tee /tmp/govet.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post vet error
        if: steps.govet.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/govet.log', 'utf8').slice(0, 5000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || 321,
              body: `## Vet Failed\n\`\`\`\n${log}\n\`\`\``
            });
            core.setFailed('go vet failed');

      - name: Run backend tests
        if: steps.gobuild.outcome == 'success' && steps.govet.outcome == 'success'
        id: gotest
        run: |
          go test ./... 2>&1 | tee /tmp/gotest.log
        continue-on-error: true

      - name: Post test error
        if: steps.gotest.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/gotest.log', 'utf8').slice(0, 10000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 321,
              body: `## Test Failed (exit code from go test)\n\`\`\`\n${log}\n\`\`\``
            });
            core.setFailed('go test failed');

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Generate API client
        run: make generate-frontend

      - name: Verify bundled OpenAPI spec is up-to-date
        run: |
          make bundle
          if ! git diff --exit-code spec/openapi/openapi.bundle.yaml; then
            echo "::error::spec/openapi/openapi.bundle.yaml is out of date. Run 'make bundle' and commit the result."
            exit 1
          fi

      - name: Run frontend tests
        run: make test-frontend

  mobile:
    name: Mobile Tests & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Type-check
        run: make mobile-typecheck

      - name: Run mobile tests
        run: make mobile-test


  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, mobile]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build
