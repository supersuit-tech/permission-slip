name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: permission_slip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/permission_slip_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Ensure frontend/dist exists for go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep

      - name: Run backend tests
        run: go test ./...

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Generate API client
        run: make generate-frontend

      - name: Verify bundled OpenAPI spec is up-to-date
        run: |
          make bundle
          if ! git diff --exit-code spec/openapi/openapi.bundle.yaml; then
            echo "::error::spec/openapi/openapi.bundle.yaml is out of date. Run 'make bundle' and commit the result."
            exit 1
          fi

      - name: Run frontend tests
        run: make test-frontend

  mobile:
    name: Mobile Tests & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: cd mobile && npm ci

      - name: Type-check
        run: make mobile-typecheck

      - name: Run mobile tests
        run: make mobile-test


  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, mobile]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build
