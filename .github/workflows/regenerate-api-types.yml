name: Regenerate API Types

on:
  push:
    branches: [main]
    paths:
      - "spec/openapi/**"

jobs:
  regenerate:
    name: Regenerate API Types from OpenAPI Spec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd frontend && npm ci
          cd ../mobile && npm ci

      - name: Bundle OpenAPI spec and generate API types
        run: make generate

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push regenerated types
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spec/openapi/openapi.bundle.yaml frontend/src/api/schema.d.ts mobile/src/api/schema.d.ts
          git commit -m "chore: regenerate API types from OpenAPI spec"
          git push
