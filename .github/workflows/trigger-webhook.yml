name: Trigger Webhook (disabled)
on:
  workflow_dispatch:
    inputs:
      message:
        description: "Custom message (overrides pr_url/pr_title construction when provided)"
        required: false
        default: ""
      pr_url:
        description: "PR URL (optional — omitted for non-PR notifications)"
        required: false
        default: ""
      pr_title:
        description: "PR title (optional — included in payload when provided)"
        required: false
        default: ""

jobs:
  notify:
    if: false  # Webhook notifications disabled — no longer in use
    runs-on: ubuntu-latest
    steps:
      - name: Send Webhook
        env:
          MESSAGE_OVERRIDE: ${{ inputs.message }}
          PR_URL: ${{ inputs.pr_url }}
          PR_TITLE: ${{ inputs.pr_title }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          NOTIFY_WEBHOOK_SECRET: ${{ secrets.NOTIFY_WEBHOOK_SECRET }}
        run: |
          if [ -z "$NOTIFY_WEBHOOK_URL" ]; then
            echo "::error::NOTIFY_WEBHOOK_URL secret is not set"
            exit 1
          fi

          ACTOR="@${GITHUB_ACTOR}"

          if [ -n "$MESSAGE_OVERRIDE" ]; then
            MESSAGE="permission-slip: ${MESSAGE_OVERRIDE}"
          elif [ -n "$PR_URL" ] && [ -n "$PR_TITLE" ]; then
            MESSAGE="permission-slip: ${PR_TITLE} needs your review (from ${ACTOR}) — ${PR_URL}"
          elif [ -n "$PR_URL" ]; then
            MESSAGE="permission-slip: PR needs your review (from ${ACTOR}) — ${PR_URL}"
          else
            MESSAGE="permission-slip: Your attention needed (triggered by ${ACTOR})"
          fi

          PAYLOAD=$(jq -n --arg msg "$MESSAGE" --arg secret "$NOTIFY_WEBHOOK_SECRET" \
            '{message: $msg, secret: $secret}')

          curl -s -X POST "$NOTIFY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
