app = 'permission-slip'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]
  # Vite inlines these into the JS bundle at build time.
  [build.args]
    VITE_SUPABASE_URL = "https://rixmzguicuihjvzumyxm.supabase.co"
    VITE_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_4Db9aiXHjC7JG-K1w3V54g_qLLrDL4o"

[env]
  PORT = '8080'
  CLOUDFLARE_INSIGHTS = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = '10s'
  interval = '15s'
  method = 'GET'
  timeout = '3s'
  path = '/api/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
