app = 'permission-slip'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]
  # Vite build args (VITE_SUPABASE_URL, VITE_SENTRY_DSN, etc.) are passed
  # via --build-arg in the deploy workflow. See .github/workflows/deploy.yml.

[env]
  PORT = '8080'
  CLOUDFLARE_INSIGHTS = 'true'
  # POSTHOG_HOST is set via Fly secrets for the hosted deployment
  # (see: fly secrets set POSTHOG_HOST=...). Self-hosters should set
  # their own value or leave unset to use the PostHog default.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = '10s'
  interval = '15s'
  method = 'GET'
  timeout = '3s'
  path = '/api/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
